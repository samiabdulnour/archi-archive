<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F2EEE6">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0F0F0E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>archi-archive</title>
  <style>
    /* ============ THEME — paper & ink, with mode-color accents ============ */
    :root {
      color-scheme: light dark;

      /* Default = light (paper surface, ink text) */
      --bg: #F2EEE6;
      --bg-elev: #FFFFFF;
      --bg-elev-2: #EAE5DC;
      --bg-input: #FFFFFF;
      --text: #0F0F0E;
      --text-muted: rgba(15,15,14,0.62);
      --text-faint: rgba(15,15,14,0.38);
      --border: rgba(15,15,14,0.16);
      --border-strong: rgba(15,15,14,0.32);

      /* Mode-coloured accents (applied selectively, not as a global tint) */
      --reference: #A8EFB7;
      --project:   #F2E961;
      --save:      #FF5A4D;

      /* Generic accent stays the ink — used for primary buttons, links, etc. */
      --accent: #0F0F0E;
      --accent-ink: #F2EEE6;
      --danger: #FF5A4D;
      --pill-bg: rgba(15,15,14,0.06);
      --pill-active-bg: #0F0F0E;
      --pill-active-text: #F2EEE6;
      --overlay: rgba(15,15,14,0.45);

      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", system-ui, sans-serif;
      --font-mono: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif; /* same — we no longer use a separate mono face */
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0F0F0E;
        --bg-elev: #1A1A18;
        --bg-elev-2: #2A2A26;
        --bg-input: #1A1A18;
        --text: #F2EEE6;
        --text-muted: rgba(242,238,230,0.62);
        --text-faint: rgba(242,238,230,0.38);
        --border: rgba(242,238,230,0.14);
        --border-strong: rgba(242,238,230,0.3);

        --accent: #F2EEE6;
        --accent-ink: #0F0F0E;
        --pill-bg: rgba(242,238,230,0.08);
        --pill-active-bg: #F2EEE6;
        --pill-active-text: #0F0F0E;
        --overlay: rgba(0,0,0,0.65);
      }
    }

    * { box-sizing: border-box; }

    /* The hidden HTML attribute should win over any display rule we set. */
    [hidden] { display: none !important; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    button, input, textarea {
      font-family: inherit;
      font-size: inherit;
      color: inherit;
    }

    button {
      border: 0;
      background: none;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* Views: only one shown at a time */
    .view {
      display: none;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
    }
    .view.active { display: flex; }

    .hidden-file {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    /* ============ HOME ============ */
    #view-home {
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      gap: 2rem;
    }

    #view-home h1 {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: -0.005em;
      color: var(--text-faint);
      margin: 0;
    }

    .take-photo {
      display: block;
      width: 100%;
      max-width: 320px;
      padding: 1rem 1.25rem;
      border-radius: 14px;
      background: var(--accent);
      color: var(--accent-ink);
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.1s ease;
    }
    .take-photo:active { opacity: 0.7; }

    .take-photo.secondary {
      background: var(--bg-elev);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .take-photo.secondary:active { background: var(--bg-elev-2); }

    .home-hint {
      color: var(--text-muted);
      font-size: 0.82rem;
      margin: -1.25rem 0 0;
      text-align: center;
      max-width: 280px;
      line-height: 1.35;
    }

    .link-button {
      padding: 0.6rem 1.1rem;
      font-size: 0.95rem;
      color: var(--accent);
      border: 0;
      border-radius: 10px;
      background: transparent;
    }
    .link-button:active { opacity: 0.6; }

    /* ============ CAMERA (always dark — like Camera.app) ============ */
    #view-camera {
      padding: 0;
      background: #000;
      position: relative;
      overflow: hidden;
      color: #fff;
    }

    .cam-video {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      object-fit: cover;
      background: #000;
      display: block;
    }

    /* Top bar */
    .cam-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: env(safe-area-inset-top, 0.75rem) 0.9rem 0.75rem;
      padding-top: max(env(safe-area-inset-top, 0.75rem), 0.75rem);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.6rem;
      z-index: 10;
    }

    .cam-pill {
      background: rgba(0,0,0,0.55);
      color: #fff;
      border-radius: 999px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .cam-icon {
      width: 38px;
      height: 38px;
      font-size: 1.2rem;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .cam-top-left {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      flex: 1;
      min-width: 0;
    }
    .cam-reuse-toggle {
      width: 36px;
      height: 36px;
      font-size: 1.05rem;
      flex-shrink: 0;
      opacity: 0.6;
      transition: opacity 0.1s ease, background 0.1s ease;
    }
    .cam-reuse-toggle.active {
      background: #A8EFB7;
      color: #0F0F0E;
      opacity: 1;
    }

    .cam-project-trigger {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.45rem 0.85rem;
      font-size: 0.88rem;
      max-width: 60vw;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cam-project-trigger #cam-project-label {
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .cam-project-trigger.active {
      background: #F2E961;
      color: #0F0F0E;
      font-weight: 600;
    }
    .cam-caret {
      font-size: 0.8rem;
      opacity: 0.7;
    }

    /* Project picker popup, drops below the top-left trigger */
    .cam-project-popup {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0.75rem) + 50px);
      left: 0.9rem;
      min-width: 220px;
      max-width: 70vw;
      max-height: 60vh;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 14px;
      padding: 0.4rem;
      overflow-y: auto;
      z-index: 30;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    .cam-project-popup .item {
      display: flex;
      align-items: center;
      padding: 0.7rem 0.85rem;
      border-radius: 10px;
      color: #fff;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .cam-project-popup .item:active { background: rgba(255,255,255,0.08); }
    .cam-project-popup .item.active {
      background: rgba(255,255,255,0.12);
      font-weight: 600;
    }
    .cam-project-popup .item.new {
      color: #A8EFB7;
      border-top: 1px solid rgba(255,255,255,0.1);
      margin-top: 0.2rem;
      padding-top: 0.8rem;
    }
    .cam-project-popup .empty {
      padding: 0.8rem 0.85rem;
      color: #98989d;
      font-size: 0.85rem;
      text-align: center;
    }

    /* Mode toggle: VIDEO/PHOTO style — pill with two segments */
    .cam-mode {
      display: flex;
      gap: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 999px;
      padding: 0.2rem;
    }
    .cam-mode-btn {
      padding: 0.4rem 0.85rem;
      font-size: 0.78rem;
      letter-spacing: -0.005em;
      color: rgba(255,255,255,0.6);
      border-radius: 999px;
    }
    .cam-mode-btn.active[data-cam-mode="reference"] {
      background: #A8EFB7;
      color: #0F0F0E;
      font-weight: 600;
    }
    .cam-mode-btn.active[data-cam-mode="project"] {
      background: #F2E961;
      color: #0F0F0E;
      font-weight: 600;
    }

    /* Shutter (centered, just above the bottom bar) */
    .cam-shutter {
      position: absolute;
      left: 50%;
      bottom: calc(max(env(safe-area-inset-bottom, 1rem), 1rem) + 70px);
      transform: translateX(-50%);
      width: 78px;
      height: 78px;
      border-radius: 999px;
      background: #fff;
      border: 4px solid rgba(255,255,255,0.55);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.2);
      transition: transform 0.07s ease, opacity 0.15s ease;
      z-index: 12;
    }
    .cam-shutter:active { transform: translateX(-50%) scale(0.92); background: #ddd; }
    .cam-shutter.disabled {
      opacity: 0.35;
      pointer-events: none;
    }

    /* Bottom bar: thumbnail | mode | flip */
    .cam-top-right {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .cam-lite {
      display: inline-flex;
      align-items: center;
      gap: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 999px;
      padding: 3px;
    }
    .cam-lite-btn {
      width: 30px; height: 26px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: -0.005em;
      color: rgba(255,255,255,0.55);
      background: transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .cam-lite-btn.active {
      background: #fff;
      color: #000;
    }

    .cam-bottom-bar {
      position: absolute;
      left: 0; right: 0;
      bottom: max(env(safe-area-inset-bottom, 0.75rem), 0.75rem);
      padding: 0 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 11;
    }

    .cam-thumb {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      background-size: cover;
      background-position: center;
      background-color: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.85);
      overflow: hidden;
    }
    .cam-thumb.empty {
      background-color: rgba(0,0,0,0.55);
      border-color: rgba(255,255,255,0.4);
    }

    .cam-flash {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 30;
    }
    .cam-flash.snap {
      animation: camFlash 280ms ease-out;
    }
    @keyframes camFlash {
      0%   { opacity: 0; }
      18%  { opacity: 0.8; }
      100% { opacity: 0; }
    }

    .cam-focus {
      position: absolute;
      width: 64px;
      height: 64px;
      border: 1.5px solid #A8EFB7;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      z-index: 11;
      transform: translate(-50%, -50%) scale(1.4);
      transition: opacity 180ms ease, transform 180ms ease;
      box-shadow: 0 0 0 0.5px rgba(0,0,0,0.4);
    }
    .cam-focus.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .cam-error {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      color: #eee;
      background: rgba(0,0,0,0.85);
      z-index: 20;
    }

    /* ============ CAPTURE — paper-shell tagger ============ */
    /* The tagger is always paper + ink, regardless of the device theme. */
    #view-capture {
      padding: 0 0 90px;
      background: #F2EEE6;
      color: #0F0F0E;
    }
    #view-capture .gallery-header {
      background: rgba(242,238,230,0.85);
    }
    #view-capture .back-btn { color: #0F0F0E; }
    #view-capture .meta-date { color: rgba(15,15,14,0.62); }

    #capture-preview {
      width: calc(100% - 32px);
      margin: 0 16px;
      max-height: 28vh;
      object-fit: cover;
      border-radius: 10px;
      background: #2a2a26;
      display: block;
    }

    .step-question {
      /* Hidden — the header already shows the step name. */
      display: none;
    }

    /* Swatch sections (paper-shell tagger) */
    .sw-section {
      padding: 16px 16px 14px;
      border-bottom: 1px solid rgba(15,15,14,0.08);
    }
    .sw-section-text { padding-bottom: 16px; }
    .sw-section-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 12px;
      gap: 12px;
    }
    .sw-section-label {
      font-size: 0.75rem;
      font-weight: 500;
      color: rgba(15,15,14,0.62);
      letter-spacing: -0.005em;
    }
    .sw-section-summary {
      font-size: 0.85rem;
      font-weight: 500;
      color: #0F0F0E;
      letter-spacing: -0.005em;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sw-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .sw-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: transparent;
      padding: 0;
    }
    .sw-art {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 10px;
      background: #FFFFFF;
      border: 1px solid rgba(15,15,14,0.16);
      color: #0F0F0E;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      overflow: hidden;
      transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
    }
    .sw-art > svg { width: 60%; height: 60%; }
    .sw-tile.active .sw-art {
      background: #0F0F0E;
      color: #F2EEE6;
      border-color: #0F0F0E;
    }
    .sw-art .sw-check {
      position: absolute;
      top: 5px; right: 5px;
      width: 14px; height: 14px;
      border-radius: 99px;
      background: #A8EFB7;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .sw-art .sw-check::after {
      content: "";
      width: 6px; height: 6px;
      border-right: 2px solid #0F0F0E;
      border-bottom: 2px solid #0F0F0E;
      transform: rotate(45deg) translate(-1px, -1px);
    }
    .sw-tile.active .sw-art .sw-check { display: inline-flex; }
    .sw-label {
      font-size: 0.7rem;
      font-weight: 500;
      color: rgba(15,15,14,0.62);
      letter-spacing: -0.005em;
      text-align: center;
      line-height: 1.15;
    }
    .sw-tile.active .sw-label {
      color: #0F0F0E;
      font-weight: 600;
    }

    /* Single-line text input with hairline underline (Author · Year) */
    .sw-line-input {
      width: 100%;
      box-sizing: border-box;
      background: transparent;
      color: #0F0F0E;
      border: 0;
      border-bottom: 1px solid rgba(15,15,14,0.25);
      padding: 8px 0;
      font-size: 0.95rem;
      font-family: var(--font-sans);
      letter-spacing: -0.005em;
      outline: none;
      resize: vertical;
    }
    .sw-line-input:focus {
      border-bottom-color: #0F0F0E;
    }

    /* Save bar — full-width ink button at the bottom of the capture view */
    .sw-save-bar {
      position: fixed;
      left: 0; right: 0;
      bottom: max(env(safe-area-inset-bottom, 12px), 12px);
      padding: 0 16px;
      z-index: 20;
      pointer-events: none;
    }
    .sw-save-btn {
      pointer-events: auto;
      width: 100%;
      background: #0F0F0E;
      color: #F2EEE6;
      border: 0;
      padding: 14px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .sw-save-btn:active { opacity: 0.85; }

    /* Capture flow chip layout: equal-width auto-fit grid (cleaner than flex-wrap). */
    #capture-step-container .chip-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 0.45rem;
    }
    #capture-step-container .chip-row .chip {
      text-align: center;
      padding: 0.6rem 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .type-buttons { display: grid; gap: 0.5rem; }

    .type-btn {
      padding: 0.95rem 1.1rem;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      text-align: left;
      line-height: 1.3;
    }
    .type-btn:active { background: var(--bg-elev-2); }
    .type-btn strong {
      display: block;
      font-weight: 600;
      font-size: 1.05rem;
      letter-spacing: -0.01em;
      margin-bottom: 0.15rem;
    }
    .type-btn span { color: var(--text-muted); font-size: 0.85rem; }

    /* Chip grids */
    .chip-group { margin-bottom: 0.75rem; }

    .chip-group-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: -0.005em;
      color: var(--text-faint);
      margin: 0 0 0.4rem;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .chip {
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      background: var(--pill-bg);
      border: 0;
      color: var(--text);
      font-size: 0.9rem;
      line-height: 1;
      transition: opacity 0.1s ease;
    }
    .chip:active { opacity: 0.6; }
    .chip.active {
      background: var(--pill-active-bg);
      color: var(--pill-active-text);
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-bottom: 0.75rem;
    }

    .form-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: -0.005em;
      color: var(--text-muted);
    }

    .form-input {
      padding: 0.7rem 0.85rem;
      border-radius: 10px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1rem;
      width: 100%;
    }
    .form-input:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }

    .capture-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .capture-actions button {
      flex: 1;
      padding: 0.85rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--accent-ink);
    }
    .btn-primary:active { opacity: 0.7; }

    .btn-secondary {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-secondary:active { background: var(--bg-elev-2); }

    .label-photo-box {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem;
      background: var(--bg-elev-2);
      border-radius: 10px;
      margin-bottom: 0.75rem;
    }

    .label-photo-box img {
      width: 44px;
      height: 44px;
      object-fit: cover;
      border-radius: 6px;
      background: var(--bg-elev);
    }

    .label-photo-box .label-meta {
      flex: 1;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .label-photo-box .label-remove {
      color: var(--danger);
      font-size: 0.85rem;
      padding: 0.35rem 0.6rem;
    }


    /* ============ GALLERY ============ */
    #view-gallery { padding: 0 0 2rem; }

    .gallery-header {
      display: flex;
      align-items: center;
      padding: 0.6rem 1rem;
      gap: 0.6rem;
      position: sticky;
      top: 0;
      background: color-mix(in srgb, var(--bg) 80%, transparent);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      z-index: 10;
      min-height: 44px;
    }

    .back-btn {
      font-size: 1.5rem;
      padding: 0.2rem 0.4rem;
      color: var(--accent);
      line-height: 1;
    }

    .search-input {
      flex: 1;
      padding: 0.55rem 0.9rem;
      border-radius: 10px;
      background: var(--pill-bg);
      border: 0;
      color: var(--text);
      font-size: 0.95rem;
    }
    .search-input::placeholder { color: var(--text-faint); }
    .search-input:focus { outline: 2px solid var(--accent); }

    .type-filter-row {
      display: flex;
      gap: 0.4rem;
      padding: 0 1rem 0.6rem;
      overflow-x: auto;
    }

    #count {
      padding: 0 1rem 0.5rem;
      font-family: var(--font-mono);
      color: var(--text-faint);
      font-size: 0.78rem;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      padding: 0 2px;
    }

    .photo-grid .tile {
      position: relative;
      aspect-ratio: 1;
      background: var(--bg-elev-2);
      cursor: pointer;
      overflow: hidden;
    }

    .photo-grid img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-grid .type-badge {
      position: absolute;
      top: 6px;
      left: 6px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      color: #fff;
      font-family: var(--font-mono);
      font-size: 0.62rem;
      padding: 2px 6px;
      border-radius: 999px;
      letter-spacing: -0.005em;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    /* ============ DETAIL ============ */
    #view-detail { padding: 0 1rem 2rem; gap: 1rem; }

    #detail-img {
      width: 100%;
      max-height: 50vh;
      object-fit: contain;
      border-radius: 14px;
      background: var(--bg-elev-2);
    }

    .section {
      background: var(--bg-elev);
      border-radius: 14px;
      padding: 0.9rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .section-title {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: -0.005em;
      color: var(--text-muted);
      margin: 0 0 0.15rem;
    }

    .keyword-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    .keyword-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.7rem;
      background: var(--pill-bg);
      border: 0;
      border-radius: 999px;
      color: var(--text);
      font-size: 0.85rem;
    }

    .keyword-tag .remove {
      color: var(--text-faint);
      cursor: pointer;
    }

    .keyword-input {
      padding: 0.5rem 0.85rem;
      border-radius: 10px;
      background: var(--pill-bg);
      border: 0;
      color: var(--text);
      font-size: 0.9rem;
      flex: 1;
      min-width: 100px;
    }
    .keyword-input::placeholder { color: var(--text-faint); }

    .meta-date {
      font-family: var(--font-mono);
      color: var(--text-muted);
      font-size: 0.78rem;
      letter-spacing: 0.01em;
    }

    #delete-btn {
      margin-top: 0.5rem;
      padding: 0.85rem;
      border-radius: 12px;
      background: var(--bg-elev);
      border: 0;
      color: var(--danger);
      font-size: 1rem;
      font-weight: 500;
    }
    #delete-btn:active { background: var(--bg-elev-2); }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(2rem);
      background: var(--bg-elev);
      color: var(--text);
      padding: 0.7rem 1.2rem;
      border-radius: 999px;
      font-size: 0.92rem;
      font-weight: 500;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>


  <!-- ============ SETTINGS ============ -->
  <section id="view-settings" class="view">
    <header class="gallery-header">
      <button class="back-btn" data-goto="home">&larr;</button>
      <span class="meta-date">Options</span>
    </header>
    <div style="padding: 0 1rem; display:flex; flex-direction:column; gap:1rem;">

      <div class="section">
        <p class="section-title">Projects</p>
        <div id="settings-projects-list"></div>
      </div>

      <div class="section">
        <p class="section-title">Building flow steps</p>
        <p style="margin:0 0 0.5rem; color:#888; font-size:0.78rem;">Which questions to ask after picking Building.</p>
        <div id="settings-steps-list"></div>
      </div>

      <div class="section">
        <p class="section-title">Custom materials</p>
        <div id="settings-custom-materiality"></div>
      </div>

    </div>
  </section>

  <!-- ============ HOME = CAMERA (custom getUserMedia camera) ============ -->
  <section id="view-camera" class="view active">
    <video id="cam-video" class="cam-video" playsinline webkit-playsinline autoplay muted></video>

    <!-- Top bar: type+reuse pills (reference) or project pill (project) on the left, options on the right -->
    <div class="cam-top">
      <div class="cam-top-left">
        <!-- Reference mode pills -->
        <button class="cam-pill cam-project-trigger" id="cam-type-trigger">
          <span id="cam-type-label">Building</span>
          <span class="cam-caret">&#9662;</span>
        </button>
        <button class="cam-pill cam-icon cam-reuse-toggle" id="cam-reuse-toggle" aria-label="Reuse last tags">&#8634;</button>
        <!-- Project mode pill (hidden by default) -->
        <button class="cam-pill cam-project-trigger" id="cam-project-trigger" hidden>
          <span id="cam-project-label">Pick project</span>
          <span class="cam-caret" id="cam-project-caret">&#9662;</span>
        </button>
      </div>
      <div class="cam-top-right">
        <div class="cam-lite" role="group" aria-label="Lite or Full tagging">
          <button class="cam-lite-btn" data-lite="1" aria-label="Lite — save now, tag later">L</button>
          <button class="cam-lite-btn active" data-lite="0" aria-label="Full — tag now">F</button>
        </div>
        <button class="cam-pill cam-icon" id="cam-options" aria-label="Options">&#8943;</button>
      </div>
    </div>

    <!-- Shared dropdown popup, anchored under the top-left -->
    <div class="cam-project-popup" id="cam-project-popup" hidden></div>

    <!-- Centered shutter sits above the bottom bar -->
    <button class="cam-shutter" id="cam-shutter" aria-label="Take photo"></button>

    <!-- Bottom bar: gallery thumb (left), mode toggle (center), flip-camera (right) -->
    <div class="cam-bottom-bar">
      <button class="cam-thumb empty" id="cam-thumb" aria-label="Gallery"></button>
      <div class="cam-mode">
        <button class="cam-mode-btn active" data-cam-mode="reference">Reference</button>
        <button class="cam-mode-btn" data-cam-mode="project">Project</button>
      </div>
      <button class="cam-pill cam-icon" id="cam-flip" aria-label="Switch camera">&#8634;</button>
    </div>

    <div class="cam-flash" id="cam-flash" aria-hidden="true"></div>
    <div class="cam-focus" id="cam-focus" aria-hidden="true"></div>
    <div class="cam-error" id="cam-error" hidden></div>
  </section>

  <!-- ============ CAPTURE ============ -->
  <section id="view-capture" class="view">
    <header class="gallery-header">
      <button class="back-btn" id="capture-back">&larr;</button>
      <span class="meta-date" id="capture-step-label"></span>
    </header>
    <div style="padding: 0 1rem; display:flex; flex-direction:column; gap:1rem;">
      <img id="capture-preview" alt="">
      <div id="capture-step-container"></div>
    </div>
  </section>

  <!-- ============ GALLERY ============ -->
  <section id="view-gallery" class="view">
    <header class="gallery-header">
      <button class="back-btn" data-goto="home">&larr;</button>
      <input type="search" class="search-input" id="search-input" placeholder="Search (e.g. railing, school, colorful)">
    </header>

    <div class="type-filter-row" id="type-filter-row">
      <button class="chip active" data-type-filter="all">All</button>
      <button class="chip" data-type-filter="building">Building</button>
      <button class="chip" data-type-filter="element">Element</button>
      <button class="chip" data-type-filter="graphic">Graphic</button>
    </div>

    <div class="type-filter-row" id="project-filter-row" hidden></div>

    <div id="count"></div>
    <div id="photo-grid" class="photo-grid"></div>
    <p id="empty" class="empty-state" hidden>No photos yet.</p>
  </section>

  <!-- ============ DETAIL / ENRICH ============ -->
  <section id="view-detail" class="view">
    <header class="gallery-header">
      <button class="back-btn" data-goto="gallery">&larr;</button>
      <span class="meta-date" id="detail-date"></span>
    </header>
    <img id="detail-img" alt="">
    <div id="detail-body"></div>
    <button id="delete-btn">Delete photo</button>
  </section>

  <!-- Hidden file input (only used by detail view to attach a label photo to artworks) -->
  <input id="label-input" class="hidden-file" type="file" accept="image/*" capture="environment">

  <div id="toast"></div>

  <script>
    // ============================================================
    // TAXONOMY (v3)
    // ============================================================
    const TYPES = [
      { id: 'building', label: 'Building', hint: 'A whole building or space' },
      { id: 'element',  label: 'Element',  hint: 'A part or detail (railing, stair, tile...)' },
      { id: 'graphic',  label: 'Graphic',  hint: 'Flat: artwork, book, drawing, product, contact...' },
    ];

    const TYPOLOGY = [
      'Residential', 'Office', 'Cultural', 'Educational', 'Religious',
      'Civic', 'Commercial', 'Hospitality', 'Industrial', 'Heritage/Ruin', 'Other'
    ];

    const CONCEPTS = [
      { id: 'form',        label: 'Form',        hint: 'massing, geometry, composition' },
      { id: 'space',       label: 'Space',       hint: 'enclosure, sequence, proportion' },
      { id: 'light',       label: 'Light',       hint: 'daylight, shadow, atmosphere' },
      { id: 'materiality', label: 'Materiality', hint: 'surface, texture, tactility' },
      { id: 'structure',   label: 'Structure',   hint: 'tectonics, load' },
      { id: 'context',     label: 'Context',     hint: 'site, landscape, urban' },
      { id: 'circulation', label: 'Circulation', hint: 'movement, threshold, path' },
      { id: 'craft',       label: 'Craft',       hint: 'joint, junction, made-ness' },
    ];

    const ELEMENT_GROUPS = {
      Structural:  ['Column', 'Beam', 'Wall', 'Arch', 'Vault', 'Dome', 'Truss'],
      Circulation: ['Door', 'Window', 'Stair', 'Ramp', 'Corridor', 'Threshold', 'Balcony'],
      Enclosure:   ['Roof', 'Ceiling', 'Floor', 'Facade'],
      Ornament:    ['Cornice', 'Railing', 'Joint', 'Pavement'],
    };

    const MATERIALS = [
      'Concrete', 'Brick/Masonry', 'Stone', 'Timber', 'Steel', 'Other Metals',
      'Glass', 'Earth/Rammed', 'Ceramic/Tile', 'Plaster/Render', 'Textile/Soft'
    ];

    const GRAPHIC_KINDS = [
      { id: 'artwork', label: 'Artwork', hint: 'painting, sculpture' },
      { id: 'book',    label: 'Book',    hint: 'page, article' },
      { id: 'drawing', label: 'Drawing', hint: 'sketch, plan' },
      { id: 'product', label: 'Product', hint: 'lamp, chair, spec' },
      { id: 'contact', label: 'Contact', hint: 'business card' },
      { id: 'other',   label: 'Other',   hint: 'note, sign, receipt' },
    ];

    const VISUAL = [
      'Colorful', 'Monochrome', 'Textured', 'Minimal', 'Patterned',
      'Ornate', 'Dark', 'Light'
    ];

    // ============================================================
    // STATE
    // ============================================================
    let pendingBlob = null;       // primary photo during capture
    let pendingLabelBlob = null;  // optional label photo during capture
    let captureDraft = null;      // tags_human being built during capture
    let captureStep = null;       // current step name
    let captureBackStack = [];    // history of steps visited (for back button)

    let activeFilters = { type: 'all', search: '', project: null };
    let currentDetailId = null;
    let currentDetailRecord = null;
    let objectUrls = [];

    // For label-input: context-dependent behaviour
    let labelInputTarget = null;  // 'capture' | 'detail'

    // Home-path state: which mode the next camera tap is in
    let captureMode = 'reference';  // 'reference' | 'project'
    let activeProject = null;

    // Location captured async between tapping the camera button and saving.
    let pendingLocation = null;     // { lat, lng, accuracy } or null

    function startLocationCapture() {
      pendingLocation = null;
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          pendingLocation = {
            lat: pos.coords.latitude,
            lng: pos.coords.longitude,
            accuracy: pos.coords.accuracy,
          };
        },
        () => { /* denied or failed; save without location */ },
        { enableHighAccuracy: false, timeout: 8000, maximumAge: 60000 }
      );
    }

    function takePendingLocation() {
      const loc = pendingLocation;
      pendingLocation = null;
      return loc;
    }

    // ============================================================
    // SETTINGS (per-user customisation, stored in localStorage)
    // ============================================================
    const SETTINGS_KEY = 'archi-archive:settings';

    function loadSettings() {
      try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; }
      catch { return {}; }
    }
    function saveSettings(s) {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
    }

    function getCustom(category) {
      return (loadSettings().custom || {})[category] || [];
    }
    function setCustom(category, items) {
      const s = loadSettings();
      s.custom = s.custom || {};
      s.custom[category] = items;
      saveSettings(s);
    }
    function getStepEnabled(section) {
      // default true
      return (loadSettings().buildingSteps || {})[section] !== false;
    }
    function setStepEnabled(section, enabled) {
      const s = loadSettings();
      s.buildingSteps = s.buildingSteps || {};
      s.buildingSteps[section] = enabled;
      saveSettings(s);
    }

    // User-created project names that may not yet have any photos.
    function getStoredProjects() {
      return loadSettings().projects || [];
    }
    function addStoredProject(name) {
      const s = loadSettings();
      s.projects = s.projects || [];
      if (!s.projects.some(p => p.toLowerCase() === name.toLowerCase())) {
        s.projects.push(name);
        saveSettings(s);
      }
    }
    function removeStoredProject(name) {
      const s = loadSettings();
      s.projects = (s.projects || []).filter(p => p !== name);
      saveSettings(s);
    }

    function getEffectiveTypology() {
      return [...TYPOLOGY, ...getCustom('typology')];
    }
    function getEffectiveConcepts() {
      return [...CONCEPTS, ...getCustom('concept').map(label => ({
        id: 'custom_' + label.toLowerCase().replace(/[^a-z0-9]/g, '_'),
        label,
      }))];
    }
    function getEffectiveMaterials() {
      return [...MATERIALS, ...getCustom('materiality')];
    }

    // Building flow steps in order, each tied to a settings section key.
    const BUILDING_STEP_ORDER = [
      { step: 'primary-building',              section: 'typology' },
      { step: 'primary-building-concepts',     section: 'concept' },
      { step: 'primary-building-materiality',  section: 'materiality' },
      { step: 'primary-building-meta',         section: 'architect_year' },
      { step: 'primary-building-note',         section: 'note' },
    ];
    const BUILDING_STEP_LABELS = {
      typology:       'Typology',
      concept:        'Concepts',
      materiality:    'Materiality',
      architect_year: 'Architect & year',
      note:           'Personal note',
    };

    function nextEnabledBuildingStep(currentStep) {
      const idx = BUILDING_STEP_ORDER.findIndex(s => s.step === currentStep);
      for (let i = idx + 1; i < BUILDING_STEP_ORDER.length; i++) {
        if (getStepEnabled(BUILDING_STEP_ORDER[i].section)) return BUILDING_STEP_ORDER[i].step;
      }
      return null;
    }

    // After picking Building at the type step, jump directly to the first enabled section.
    function firstEnabledBuildingStep() {
      for (const s of BUILDING_STEP_ORDER) {
        if (getStepEnabled(s.section)) return s.step;
      }
      return null;
    }

    // ============================================================
    // INDEXEDDB
    // ============================================================
    const DB_NAME = 'archi-archive';
    const STORE = 'photos';
    const DB_VERSION = 2;   // v3 app / db version 2 (v2 app was db version 1)
    let dbPromise = null;

    function openDb() {
      if (dbPromise) return dbPromise;
      dbPromise = new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (event) => {
          const db = req.result;
          // v3 schema change is big enough that we wipe and recreate
          if (db.objectStoreNames.contains(STORE)) {
            db.deleteObjectStore(STORE);
          }
          db.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
      return dbPromise;
    }

    async function dbAdd(record) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const req = db.transaction(STORE, 'readwrite').objectStore(STORE).add(record);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function dbPut(record) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const req = db.transaction(STORE, 'readwrite').objectStore(STORE).put(record);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function dbGetAll() {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const req = db.transaction(STORE, 'readonly').objectStore(STORE).getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function dbGet(id) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const req = db.transaction(STORE, 'readonly').objectStore(STORE).get(id);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function dbDelete(id) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const req = db.transaction(STORE, 'readwrite').objectStore(STORE).delete(id);
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
      });
    }

    // ============================================================
    // SEARCH INDEX — flatten all tag values into a searchable string
    // ============================================================
    function buildSearchText(record) {
      const t = record.tags_human || {};
      const parts = [
        t.type, t.typology, t.typology_note,
        ...(t.concepts || []), t.concepts_note,
        t.element_name, t.element_note, t.material,
        ...(t.materials || []), t.materials_note,
        t.graphic_kind,
        t.title, t.creator, t.year, t.source,
        t.brand, t.model,
        t.contact_name, t.contact_company,
        t.project,
        t.note,
        ...(t.visual || []),
        ...(t.keywords || []),
      ];
      return parts.filter(Boolean).join(' ').toLowerCase();
    }

    // ============================================================
    // VIEW SWITCHING
    // ============================================================
    function showView(name) {
      // 'home' is now the camera
      if (name === 'home') name = 'camera';
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      const view = document.getElementById('view-' + name);
      if (!view) return;
      view.classList.add('active');
      window.scrollTo(0, 0);

      // Camera stream lifecycle: only run while the camera view is active.
      if (name === 'camera') {
        updateCameraModeUI();
        hideCameraError();
        startCameraStream();
        refreshCameraThumb();
      } else {
        stopCameraStream();
        closeProjectPopup();
      }
    }

    document.querySelectorAll('[data-goto]').forEach(btn => {
      btn.addEventListener('click', () => showView(btn.dataset.goto));
    });

    // ============================================================
    // CAPTURE — tagging flow (camera lives in its own view, see CAMERA section)
    // ============================================================
    const stepContainer = document.getElementById('capture-step-container');

    // ============================================================
    // CUSTOM CAMERA (replaces native file-input camera)
    // ============================================================
    let mediaStream = null;
    let cameraFacing = 'environment';   // 'environment' | 'user'
    let cameraStarting = false;

    async function startCameraStream() {
      if (mediaStream || cameraStarting) return;
      cameraStarting = true;
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error('Camera API unavailable. The site must be served over HTTPS.');
        }
        mediaStream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: cameraFacing },
            width:  { ideal: 4096 },
            height: { ideal: 2160 },
          },
          audio: false,
        });
        const video = document.getElementById('cam-video');
        video.srcObject = mediaStream;
        // Don't await play(); the autoplay attribute starts it. Awaiting here
        // can swallow iOS NotAllowedError silently when the doc isn't yet visible.
        const p = video.play();
        if (p && p.catch) p.catch(err => showCameraError('Preview blocked: ' + (err.message || err.name)));
      } catch (err) {
        const name = (err && err.name) ? err.name + ': ' : '';
        showCameraError(name + (err && err.message ? err.message : 'Could not start the camera.'));
        if (mediaStream) {
          mediaStream.getTracks().forEach(t => t.stop());
          mediaStream = null;
        }
      } finally {
        cameraStarting = false;
      }
    }

    function stopCameraStream() {
      if (mediaStream) {
        mediaStream.getTracks().forEach(t => t.stop());
        mediaStream = null;
      }
      const video = document.getElementById('cam-video');
      if (video) video.srcObject = null;
    }

    function showCameraError(msg) {
      const el = document.getElementById('cam-error');
      el.textContent = msg;
      el.hidden = false;
    }
    function hideCameraError() {
      document.getElementById('cam-error').hidden = true;
    }

    document.getElementById('cam-options').addEventListener('click', async () => {
      await renderSettings();
      showView('settings');
    });

    document.getElementById('cam-flip').addEventListener('click', async () => {
      cameraFacing = (cameraFacing === 'environment') ? 'user' : 'environment';
      stopCameraStream();
      await startCameraStream();
    });
    document.querySelectorAll('[data-cam-mode]').forEach(btn => {
      btn.addEventListener('click', () => switchCameraMode(btn.dataset.camMode));
    });

    // ----- L / F (Lite vs Full) toggle -----
    function getLite() {
      return localStorage.getItem('archi-archive:lite') === '1';
    }
    function setLite(v) {
      if (v) localStorage.setItem('archi-archive:lite', '1');
      else localStorage.removeItem('archi-archive:lite');
      updateLiteUI();
    }
    function updateLiteUI() {
      const lite = getLite();
      document.querySelectorAll('[data-lite]').forEach(b => {
        const isThis = (b.dataset.lite === '1') === lite;
        b.classList.toggle('active', isThis);
      });
    }
    document.querySelectorAll('[data-lite]').forEach(btn => {
      btn.addEventListener('click', () => setLite(btn.dataset.lite === '1'));
    });
    updateLiteUI();

    // Projects the user typed in this session but haven't saved a photo into yet.
    let pendingNewProjects = [];

    // Reference mode: when set, the next shutter press auto-saves with these tags.
    // Stays on across multiple shots until the user picks "New tagging" or switches mode.
    let referenceReuseTags = null;

    // Persisted Reference-mode type choice (Building / Detail / Graphic).
    function getReferenceType() {
      return localStorage.getItem('archi-archive:referenceType') || 'building';
    }
    function setReferenceTypePersist(t) {
      localStorage.setItem('archi-archive:referenceType', t);
    }

    function updateCameraModeUI() {
      document.querySelectorAll('[data-cam-mode]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.camMode === captureMode);
      });

      const typeTrigger  = document.getElementById('cam-type-trigger');
      const typeLabel    = document.getElementById('cam-type-label');
      const reuseToggle  = document.getElementById('cam-reuse-toggle');
      const projTrigger  = document.getElementById('cam-project-trigger');
      const projLabel    = document.getElementById('cam-project-label');
      const projCaret    = document.getElementById('cam-project-caret');
      const shutter      = document.getElementById('cam-shutter');

      if (captureMode === 'project') {
        // Show project pill, hide reference pills.
        typeTrigger.hidden  = true;
        reuseToggle.hidden  = true;
        projTrigger.hidden  = false;
        if (activeProject) {
          projLabel.textContent = activeProject;
          projTrigger.classList.add('active');
        } else {
          projLabel.textContent = 'Pick project';
          projTrigger.classList.remove('active');
        }
        projCaret.hidden = false;
        shutter.classList.toggle('disabled', !activeProject);
      } else {
        // Reference mode: type pill + reuse toggle.
        typeTrigger.hidden  = false;
        reuseToggle.hidden  = false;
        projTrigger.hidden  = true;

        const t = TYPES.find(x => x.id === getReferenceType()) || TYPES[0];
        typeLabel.textContent = t.label;
        typeTrigger.classList.toggle('active', !!referenceReuseTags === false && false);
        // Reuse toggle visual state
        reuseToggle.classList.toggle('active', !!referenceReuseTags);
        shutter.classList.remove('disabled');
      }
    }

    function summariseReuseTags(t) {
      const parts = [];
      if (t.typology) parts.push(t.typology);
      if (t.element_name) parts.push(t.element_name);
      if (t.creator) parts.push(t.creator);
      if (parts.length === 0 && (t.materials || []).length) parts.push(t.materials[0]);
      if (parts.length === 0) parts.push('Reuse');
      return parts.slice(0, 2).join(' · ');
    }

    async function switchCameraMode(mode) {
      if (mode === 'reference') {
        captureMode = 'reference';
        closeProjectPopup();
        updateCameraModeUI();
        return;
      }
      // mode === 'project' — reuse mode is reference-only, so clear it.
      captureMode = 'project';
      referenceReuseTags = null;
      updateCameraModeUI();
      // If no project selected yet, open the picker so the user can choose immediately.
      if (!activeProject) await openProjectPopup();
    }

    // ----- Project picker popup -----
    async function openProjectPopup() {
      const popup = document.getElementById('cam-project-popup');
      popup.innerHTML = '';

      const dbProjects = await getProjectNames();
      const all = [...new Set([...dbProjects, ...pendingNewProjects])];

      if (all.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'No projects yet.';
        popup.appendChild(empty);
      } else {
        all.forEach(name => {
          const item = document.createElement('div');
          item.className = 'item';
          if (activeProject === name) item.classList.add('active');
          item.textContent = name;
          item.addEventListener('click', () => {
            activeProject = name;
            captureMode = 'project';
            closeProjectPopup();
            updateCameraModeUI();
          });
          popup.appendChild(item);
        });
      }

      const addItem = document.createElement('div');
      addItem.className = 'item new';
      addItem.textContent = '+ New project';
      addItem.addEventListener('click', addInlineProject);
      popup.appendChild(addItem);

      popup.hidden = false;
    }

    function closeProjectPopup() {
      document.getElementById('cam-project-popup').hidden = true;
    }

    document.getElementById('cam-project-trigger').addEventListener('click', async () => {
      const popup = document.getElementById('cam-project-popup');
      if (!popup.hidden) { closeProjectPopup(); return; }
      await openProjectPopup();
    });

    document.getElementById('cam-type-trigger').addEventListener('click', () => {
      const popup = document.getElementById('cam-project-popup');
      if (!popup.hidden) { closeProjectPopup(); return; }
      openTypePopup();
    });

    document.getElementById('cam-reuse-toggle').addEventListener('click', async () => {
      if (referenceReuseTags) {
        referenceReuseTags = null;
        updateCameraModeUI();
        toast('Reuse off');
        return;
      }
      const last = await getMostRecentReferenceTags();
      if (!last) {
        toast('No previous photo to reuse');
        return;
      }
      referenceReuseTags = last;
      updateCameraModeUI();
      toast('Reusing: ' + summariseReuseTags(last));
    });

    function openTypePopup() {
      const popup = document.getElementById('cam-project-popup');
      popup.innerHTML = '';
      const current = getReferenceType();
      TYPES.forEach(t => {
        const item = document.createElement('div');
        item.className = 'item';
        if (current === t.id) item.classList.add('active');
        item.innerHTML = `<div><div style="font-weight:500;">${t.label}</div><div style="opacity:0.6; font-size:0.82rem; margin-top:2px;">${t.hint}</div></div>`;
        item.addEventListener('click', () => {
          setReferenceTypePersist(t.id);
          // Changing type while reuse is on would be contradictory — clear it.
          if (referenceReuseTags) {
            referenceReuseTags = null;
            toast('Reuse off');
          }
          closeProjectPopup();
          updateCameraModeUI();
        });
        popup.appendChild(item);
      });
      popup.hidden = false;
    }

    async function getMostRecentReferenceTags() {
      const all = await dbGetAll();
      if (all.length === 0) return null;
      const refs = all
        .filter(r => r.tags_human && !r.tags_human.project)
        .sort((a, b) => b.created_at - a.created_at);
      if (refs.length === 0) return null;
      const t = refs[0].tags_human;
      // Copy only the tag fields, not blobs/dates/coords.
      return {
        type: t.type, typology: t.typology, typology_note: t.typology_note,
        concepts: [...(t.concepts || [])], concepts_note: t.concepts_note,
        element_name: t.element_name, element_note: t.element_note,
        material: t.material,
        materials: [...(t.materials || [])], materials_note: t.materials_note,
        graphic_kind: t.graphic_kind,
        title: t.title, creator: t.creator, year: t.year, source: t.source,
        brand: t.brand, model: t.model,
        contact_name: t.contact_name, contact_company: t.contact_company,
        visual: [...(t.visual || [])],
        keywords: [...(t.keywords || [])],
        note: t.note,
      };
    }

    // Tap outside the popup to dismiss.
    document.addEventListener('click', (e) => {
      const popup = document.getElementById('cam-project-popup');
      if (popup.hidden) return;
      const triggers = ['cam-project-trigger', 'cam-type-trigger', 'cam-reuse-toggle']
        .map(id => document.getElementById(id))
        .filter(Boolean);
      if (popup.contains(e.target)) return;
      if (triggers.some(t => t.contains(e.target))) return;
      closeProjectPopup();
    });

    async function addInlineProject() {
      const raw = prompt('Project name');
      if (raw == null) return;
      const name = raw.trim();
      if (!name) return;
      const existing = await getProjectNames();
      const all = [...existing, ...pendingNewProjects];
      const match = all.find(p => p.toLowerCase() === name.toLowerCase());
      const finalName = match || name;
      if (!match) pendingNewProjects.push(finalName);
      activeProject = finalName;
      captureMode = 'project';
      closeProjectPopup();
      updateCameraModeUI();
    }

    // ----- Gallery thumbnail (bottom-left) -----
    let camThumbUrl = null;
    async function refreshCameraThumb() {
      const all = await dbGetAll();
      const thumb = document.getElementById('cam-thumb');
      if (!thumb) return;
      if (all.length === 0) {
        if (camThumbUrl) { URL.revokeObjectURL(camThumbUrl); camThumbUrl = null; }
        thumb.style.backgroundImage = '';
        thumb.classList.add('empty');
        return;
      }
      const latest = all.reduce((a, b) => (a.created_at > b.created_at ? a : b));
      if (camThumbUrl) URL.revokeObjectURL(camThumbUrl);
      camThumbUrl = URL.createObjectURL(latest.blob);
      thumb.style.backgroundImage = `url("${camThumbUrl}")`;
      thumb.classList.remove('empty');
    }

    document.getElementById('cam-thumb').addEventListener('click', async () => {
      showView('gallery');
      await renderGallery();
    });

    async function shutterPressed() {
      if (captureMode === 'project' && !activeProject) {
        toast('Pick or add a project first');
        return;
      }
      flashShutter();
      const blob = await captureFrame();
      if (!blob) return;

      if (captureMode === 'project') {
        // Stay in the camera so the user can immediately shoot the next photo.
        await savePhotoToProject(blob);
        return;
      }

      // Reference mode — three branches: reuse-last, Lite, or Full.
      if (referenceReuseTags) {
        pendingBlob = blob;
        pendingLabelBlob = null;
        captureDraft = { ...referenceReuseTags };
        captureBackStack = [];
        captureStep = null;
        await finishCapture({ silent: true });
        toast('Saved · reused tags');
        return;
      }
      if (getLite()) {
        // Lite mode: save with type only, surface "Tag now" escape in the toast.
        pendingBlob = blob;
        pendingLabelBlob = null;
        captureDraft = { type: getReferenceType() };
        captureBackStack = [];
        captureStep = null;
        const id = await finishCapture({ silent: true });
        toastLiteSaved(id);
        return;
      }
      // Full mode: open the form for the chosen type.
      stopCameraStream();
      startReferenceTagging(blob);
    }
    document.getElementById('cam-shutter').addEventListener('click', shutterPressed);

    // Brief white flash overlay when the shutter fires — feels like the iOS Camera shutter.
    function flashShutter() {
      const el = document.getElementById('cam-flash');
      if (!el) return;
      el.classList.remove('snap');
      // Force reflow so the animation restarts on rapid taps.
      // eslint-disable-next-line no-unused-expressions
      void el.offsetWidth;
      el.classList.add('snap');
    }

    // Tap-to-focus: show a focus ring at the tap point, and best-effort tell
    // the camera track to focus there. Browser support varies — the visual
    // ring always shows so the gesture feels acknowledged.
    let focusTimer = null;
    document.getElementById('cam-video').addEventListener('click', async (event) => {
      const video = event.currentTarget;
      const rect = video.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      const ring = document.getElementById('cam-focus');
      ring.style.left = x + 'px';
      ring.style.top  = y + 'px';
      ring.classList.add('show');
      clearTimeout(focusTimer);
      focusTimer = setTimeout(() => ring.classList.remove('show'), 850);

      const track = mediaStream && mediaStream.getVideoTracks()[0];
      if (!track || !track.applyConstraints) return;
      const caps = track.getCapabilities ? track.getCapabilities() : {};
      const advanced = [];
      // Refocus pulse: switch back to continuous if available, then immediately
      // try a manual point-of-interest focus. Either may quietly fail per device.
      if (Array.isArray(caps.focusMode) && caps.focusMode.includes('continuous')) {
        advanced.push({ focusMode: 'continuous' });
      }
      if (Array.isArray(caps.focusMode) && caps.focusMode.includes('manual') && caps.pointsOfInterest !== undefined) {
        advanced.push({
          focusMode: 'manual',
          pointsOfInterest: [{ x: x / rect.width, y: y / rect.height }],
        });
      }
      if (advanced.length === 0) return;
      try { await track.applyConstraints({ advanced }); } catch { /* ignore unsupported */ }
    });

    async function captureFrame() {
      const video = document.getElementById('cam-video');
      if (!video) return null;
      // Wait briefly for the first frame if the user taps very fast.
      if (!video.videoWidth) {
        await new Promise(resolve => {
          const t = setTimeout(resolve, 800);
          video.addEventListener('loadeddata', () => { clearTimeout(t); resolve(); }, { once: true });
        });
      }
      if (!video.videoWidth) {
        toast('Camera not ready, try again');
        return null;
      }
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
      return new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.92));
    }

    function startReferenceTagging(blob) {
      pendingBlob = blob;
      pendingLabelBlob = null;
      // Type was chosen ahead of the photo via the top-left pill in the camera —
      // skip the "What is this?" step and open the matching form straight away.
      const t = getReferenceType();
      captureDraft = { type: t };
      captureBackStack = [];
      captureStep = 'form-' + t;
      const preview = document.getElementById('capture-preview');
      const url = URL.createObjectURL(blob);
      objectUrls.push(url);
      preview.src = url;
      showView('capture');
      renderCaptureStep();
    }

    // The camera is the home; first-load location warm-up.
    startLocationCapture();

    async function renderSettings() {
      renderSettingsSteps();
      renderSettingsCustom('materiality', 'settings-custom-materiality');

      const list = document.getElementById('settings-projects-list');
      list.innerHTML = '';

      const all = await dbGetAll();
      const counts = new Map();
      all.slice().sort((a, b) => b.created_at - a.created_at).forEach(r => {
        const p = r.tags_human && r.tags_human.project;
        if (p) counts.set(p, (counts.get(p) || 0) + 1);
      });
      // Make stored-but-unphotographed projects show up too, with count 0.
      getStoredProjects().forEach(p => { if (!counts.has(p)) counts.set(p, 0); });

      if (counts.size === 0) {
        const p = document.createElement('p');
        p.style.margin = '0 0 0.6rem';
        p.style.color = '#888';
        p.style.fontSize = '0.85rem';
        p.textContent = 'No projects yet.';
        list.appendChild(p);
      } else {
        counts.forEach((count, name) => {
          const row = document.createElement('div');
          row.style.display = 'flex';
          row.style.alignItems = 'center';
          row.style.gap = '0.5rem';
          row.style.padding = '0.6rem 0';
          row.style.borderBottom = '1px solid var(--border)';

          const label = document.createElement('div');
          label.style.flex = '1';
          label.style.fontSize = '0.95rem';
          label.innerHTML = `${name} <span style="color:var(--text-faint); font-size:0.8rem;">(${count})</span>`;
          row.appendChild(label);

          const renameBtn = document.createElement('button');
          renameBtn.className = 'chip';
          renameBtn.textContent = 'Rename';
          renameBtn.addEventListener('click', () => renameProject(name));
          row.appendChild(renameBtn);

          const delBtn = document.createElement('button');
          delBtn.className = 'chip';
          delBtn.style.color = 'var(--danger)';
          delBtn.textContent = 'Delete';
          delBtn.addEventListener('click', () => deleteProject(name, count));
          row.appendChild(delBtn);

          list.appendChild(row);
        });
      }

      // Add-new-project row
      const addRow = document.createElement('div');
      addRow.style.display = 'flex';
      addRow.style.gap = '0.4rem';
      addRow.style.marginTop = '0.6rem';

      const input = document.createElement('input');
      input.className = 'form-input';
      input.type = 'text';
      input.placeholder = 'New project name';

      const addBtn = document.createElement('button');
      addBtn.className = 'chip';
      addBtn.textContent = 'Add';

      const submit = async () => {
        const name = input.value.trim();
        if (!name) return;
        addStoredProject(name);
        input.value = '';
        await renderSettings();
      };
      addBtn.addEventListener('click', submit);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); submit(); }
      });

      addRow.appendChild(input);
      addRow.appendChild(addBtn);
      list.appendChild(addRow);
    }

    function renderSettingsSteps() {
      const root = document.getElementById('settings-steps-list');
      root.innerHTML = '';
      BUILDING_STEP_ORDER.forEach(({ section }) => {
        const row = document.createElement('label');
        row.style.display = 'flex';
        row.style.alignItems = 'center';
        row.style.gap = '0.5rem';
        row.style.padding = '0.5rem 0';
        row.style.borderBottom = '1px solid #222';
        row.style.cursor = 'pointer';

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = getStepEnabled(section);
        cb.addEventListener('change', () => setStepEnabled(section, cb.checked));

        const label = document.createElement('span');
        label.textContent = BUILDING_STEP_LABELS[section];
        label.style.flex = '1';
        label.style.fontSize = '0.95rem';

        row.appendChild(cb);
        row.appendChild(label);
        root.appendChild(row);
      });
    }

    function renderSettingsCustom(category, rootId) {
      const root = document.getElementById(rootId);
      root.innerHTML = '';

      const chipsRow = document.createElement('div');
      chipsRow.className = 'chip-row';
      chipsRow.style.marginBottom = '0.6rem';

      const items = getCustom(category);
      if (items.length === 0) {
        const empty = document.createElement('p');
        empty.style.margin = '0 0 0.6rem';
        empty.style.color = '#666';
        empty.style.fontSize = '0.82rem';
        empty.textContent = 'No custom items yet.';
        root.appendChild(empty);
      } else {
        items.forEach((label, idx) => {
          const chip = document.createElement('span');
          chip.className = 'chip active';
          chip.style.display = 'inline-flex';
          chip.style.alignItems = 'center';
          chip.style.gap = '0.4rem';
          chip.textContent = label;
          const x = document.createElement('span');
          x.textContent = '×';
          x.style.cursor = 'pointer';
          x.style.color = '#666';
          x.addEventListener('click', () => {
            const updated = getCustom(category).filter((_, i) => i !== idx);
            setCustom(category, updated);
            renderSettingsCustom(category, rootId);
          });
          chip.appendChild(x);
          chipsRow.appendChild(chip);
        });
        root.appendChild(chipsRow);
      }

      const addRow = document.createElement('div');
      addRow.style.display = 'flex';
      addRow.style.gap = '0.4rem';

      const input = document.createElement('input');
      input.className = 'form-input';
      input.type = 'text';
      input.placeholder = 'Add new…';

      const addBtn = document.createElement('button');
      addBtn.className = 'chip';
      addBtn.textContent = 'Add';

      const submit = () => {
        const v = input.value.trim();
        if (!v) return;
        const existing = getCustom(category);
        if (!existing.some(e => e.toLowerCase() === v.toLowerCase())) {
          setCustom(category, [...existing, v]);
        }
        input.value = '';
        renderSettingsCustom(category, rootId);
      };
      addBtn.addEventListener('click', submit);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); submit(); }
      });

      addRow.appendChild(input);
      addRow.appendChild(addBtn);
      root.appendChild(addRow);
    }

    async function renameProject(oldName) {
      const raw = prompt(`Rename "${oldName}" to:`, oldName);
      if (raw == null) return;
      const newName = raw.trim();
      if (!newName || newName === oldName) return;

      const all = await dbGetAll();
      const collisions = all.filter(r =>
        r.tags_human && r.tags_human.project &&
        r.tags_human.project.toLowerCase() === newName.toLowerCase() &&
        r.tags_human.project !== oldName
      );
      if (collisions.length && !confirm(`A project called "${collisions[0].tags_human.project}" already exists. Merge them?`)) {
        return;
      }

      const targetName = collisions.length ? collisions[0].tags_human.project : newName;
      const affected = all.filter(r => r.tags_human && r.tags_human.project === oldName);
      for (const r of affected) {
        r.tags_human.project = targetName;
        r.search_text = buildSearchText(r);
        await dbPut(r);
      }
      // Mirror the rename in the stored-project list.
      removeStoredProject(oldName);
      addStoredProject(targetName);
      toast(`Renamed to ${targetName}`);
      await renderSettings();
    }

    async function deleteProject(name, count) {
      if (!confirm(`Delete project "${name}"? ${count} ${count === 1 ? 'photo' : 'photos'} will be untagged (the photos themselves stay).`)) return;
      const all = await dbGetAll();
      const affected = all.filter(r => r.tags_human && r.tags_human.project === name);
      for (const r of affected) {
        r.tags_human.project = null;
        r.search_text = buildSearchText(r);
        await dbPut(r);
      }
      removeStoredProject(name);
      toast(`Project removed`);
      await renderSettings();
    }

    // Back-button: pops the history stack; if empty, discards and goes home.
    const STEP_LABEL = {
      'type':          'What is this?',
      'form-building': 'Building',
      'form-element':  'Element',
      'form-graphic':  'Graphic',
    };

    function setCaptureStep(next) {
      if (captureStep) captureBackStack.push(captureStep);
      captureStep = next;
      renderCaptureStep();
    }

    document.getElementById('capture-back').addEventListener('click', () => {
      if (captureBackStack.length === 0) {
        resetCapture();
        showView('home');
        return;
      }
      captureStep = captureBackStack.pop();
      renderCaptureStep();
    });

    function resetCapture() {
      pendingBlob = null;
      pendingLabelBlob = null;
      captureDraft = null;
      captureStep = null;
      captureBackStack = [];
    }
    function renderCaptureStep() {
      const c = stepContainer;
      c.innerHTML = '';
      document.getElementById('capture-step-label').textContent = STEP_LABEL[captureStep] || '';

      if (captureStep === 'type')          renderTypeStep(c);
      else if (captureStep === 'form-building') renderBuildingForm(c);
      else if (captureStep === 'form-element')  renderElementForm(c);
      else if (captureStep === 'form-graphic')  renderGraphicForm(c);
    }

    function renderTypeStep(c) {
      const wrap = document.createElement('div');
      wrap.className = 'type-buttons';
      TYPES.forEach(t => {
        const btn = document.createElement('button');
        btn.className = 'type-btn';
        btn.innerHTML = `<strong>${t.label}</strong><span>${t.hint}</span>`;
        btn.addEventListener('click', () => {
          captureDraft.type = t.id;
          if (t.id === 'building')      setCaptureStep('form-building');
          else if (t.id === 'element')  setCaptureStep('form-element');
          else                          setCaptureStep('form-graphic');
        });
        wrap.appendChild(btn);
      });
      c.appendChild(wrap);
    }

    // ============================================================
    // Form helpers (single-page Building/Element/Graphic forms)
    // ============================================================
    // ============================================================
    // SVG glyphs for the swatch tiles (typology / concept / element / material)
    // Ported from the design files. fill="currentColor" so they invert on active tiles.
    // ============================================================
    const TYPOLOGY_GLYPHS = {
      Residential:  '<path d="M6 20 L20 6 L34 20 V34 H6 Z" fill="currentColor"/>',
      Office:       '<g fill="currentColor"><rect x="8" y="8" width="24" height="26"/><g fill="#F2EEE6"><rect x="11" y="12" width="4" height="4"/><rect x="18" y="12" width="4" height="4"/><rect x="25" y="12" width="4" height="4"/><rect x="11" y="19" width="4" height="4"/><rect x="18" y="19" width="4" height="4"/><rect x="25" y="19" width="4" height="4"/><rect x="11" y="26" width="4" height="4"/><rect x="25" y="26" width="4" height="4"/></g></g>',

    // Material hatch patterns — each tile is a 70×70 fill with a unique hatch.
    function materialPatternSvg(name) {
      const id = 'mat-' + name.toLowerCase().replace(/[^a-z0-9]/g, '');
      const map = {
        Concrete: `<pattern id="${id}" width="6" height="6" patternUnits="userSpaceOnUse"><circle cx="1.5" cy="1.5" r="0.6" fill="currentColor"/><circle cx="4.5" cy="3.5" r="0.5" fill="currentColor"/><circle cx="2.2" cy="4.8" r="0.4" fill="currentColor"/></pattern>`,

        Stone: `<pattern id="${id}" width="16" height="16" patternUnits="userSpaceOnUse"><path d="M0 5 L6 3 L12 6 L16 5" stroke="currentColor" stroke-width="0.6" fill="none"/><path d="M0 11 L4 9 L9 12 L16 11" stroke="currentColor" stroke-width="0.6" fill="none"/><path d="M3 0 V4 M9 4 V9 M5 9 V16" stroke="currentColor" stroke-width="0.5"/></pattern>`,
        Timber: `<pattern id="${id}" width="20" height="6" patternUnits="userSpaceOnUse"><path d="M0 2 Q5 1 10 2 T20 2" stroke="currentColor" stroke-width="0.6" fill="none"/><path d="M0 4 Q5 5 10 4 T20 4" stroke="currentColor" stroke-width="0.5" fill="none"/></pattern>`,

        'Other Metals': `<pattern id="${id}" width="6" height="6" patternUnits="userSpaceOnUse"><line x1="0" y1="0" x2="6" y2="6" stroke="currentColor" stroke-width="0.6"/><line x1="6" y1="0" x2="0" y2="6" stroke="currentColor" stroke-width="0.6"/></pattern>`,

        'Earth/Rammed': `<pattern id="${id}" width="8" height="8" patternUnits="userSpaceOnUse"><path d="M0 4 Q2 2 4 4 T8 4" stroke="currentColor" stroke-width="0.5" fill="none"/></pattern>`,
        'Ceramic/Tile': `<pattern id="${id}" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="none" stroke="currentColor" stroke-width="0.5"/></pattern>`,
        'Plaster/Render': `<pattern id="${id}" width="14" height="14" patternUnits="userSpaceOnUse"><circle cx="3" cy="3" r="0.4" fill="currentColor" opacity="0.6"/><circle cx="9" cy="6" r="0.3" fill="currentColor" opacity="0.6"/><circle cx="5" cy="10" r="0.3" fill="currentColor" opacity="0.6"/><circle cx="11" cy="11" r="0.4" fill="currentColor" opacity="0.6"/></pattern>`,
        'Textile/Soft': `<pattern id="${id}" width="6" height="6" patternUnits="userSpaceOnUse"><line x1="0" y1="0" x2="6" y2="0" stroke="currentColor" stroke-width="0.4"/><line x1="0" y1="3" x2="6" y2="3" stroke="currentColor" stroke-width="0.4"/><line x1="0" y1="0" x2="0" y2="6" stroke="currentColor" stroke-width="0.4"/><line x1="3" y1="0" x2="3" y2="6" stroke="currentColor" stroke-width="0.4"/></pattern>`,
