<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f2f2f7">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000">
  <title>archi-archive</title>
  <style>
    /* ============ THEME (auto light/dark) ============ */
    :root {
      color-scheme: light dark;

      /* Default = dark */
      --bg: #000;
      --bg-elev: #1c1c1e;
      --bg-elev-2: #2c2c2e;
      --bg-input: #1c1c1e;
      --text: #f5f5f7;
      --text-muted: #98989d;
      --text-faint: #636366;
      --border: #38383a;
      --border-strong: #48484a;
      --accent: #0a84ff;
      --danger: #ff453a;
      --pill-bg: rgba(255,255,255,0.08);
      --pill-active-bg: #f5f5f7;
      --pill-active-text: #000;
      --overlay: rgba(28,28,30,0.72);

      --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", system-ui, sans-serif;
      --font-mono: "SF Mono", Menlo, Monaco, "Courier New", monospace;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f2f2f7;
        --bg-elev: #ffffff;
        --bg-elev-2: #f9f9fb;
        --bg-input: #ffffff;
        --text: #000000;
        --text-muted: #6e6e73;
        --text-faint: #aeaeb2;
        --border: #d1d1d6;
        --border-strong: #c7c7cc;
        --accent: #007aff;
        --danger: #ff3b30;
        --pill-bg: rgba(0,0,0,0.06);
        --pill-active-bg: #000000;
        --pill-active-text: #ffffff;
        --overlay: rgba(255,255,255,0.78);
      }
    }

    * { box-sizing: border-box; }

    /* The hidden HTML attribute should win over any display rule we set. */
    [hidden] { display: none !important; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    button, input, textarea {
      font-family: inherit;
      font-size: inherit;
      color: inherit;
    }

    button {
      border: 0;
      background: none;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* Views: only one shown at a time */
    .view {
      display: none;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
    }
    .view.active { display: flex; }

    .hidden-file {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    /* ============ HOME ============ */
    #view-home {
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      gap: 2rem;
    }

    #view-home h1 {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin: 0;
    }

    .take-photo {
      display: block;
      width: 100%;
      max-width: 320px;
      padding: 1rem 1.25rem;
      border-radius: 14px;
      background: var(--accent);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.1s ease;
    }
    .take-photo:active { opacity: 0.7; }

    .take-photo.secondary {
      background: var(--bg-elev);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .take-photo.secondary:active { background: var(--bg-elev-2); }

    .home-hint {
      color: var(--text-muted);
      font-size: 0.82rem;
      margin: -1.25rem 0 0;
      text-align: center;
      max-width: 280px;
      line-height: 1.35;
    }

    .link-button {
      padding: 0.6rem 1.1rem;
      font-size: 0.95rem;
      color: var(--accent);
      border: 0;
      border-radius: 10px;
      background: transparent;
    }
    .link-button:active { opacity: 0.6; }

    /* ============ CAMERA (always dark — like Camera.app) ============ */
    #view-camera {
      padding: 0;
      background: #000;
      position: relative;
      overflow: hidden;
      color: #fff;
    }

    .cam-video {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      object-fit: cover;
      background: #000;
      display: block;
    }

    /* Top bar */
    .cam-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: env(safe-area-inset-top, 0.75rem) 0.9rem 0.75rem;
      padding-top: max(env(safe-area-inset-top, 0.75rem), 0.75rem);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.6rem;
      z-index: 10;
    }

    .cam-pill {
      background: rgba(0,0,0,0.55);
      color: #fff;
      border-radius: 999px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .cam-icon {
      width: 38px;
      height: 38px;
      font-size: 1.2rem;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .cam-project-trigger {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.45rem 0.85rem;
      font-size: 0.88rem;
      max-width: 60vw;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cam-project-trigger #cam-project-label {
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .cam-project-trigger.active {
      background: #ffd60a;
      color: #000;
      font-weight: 600;
    }
    .cam-caret {
      font-size: 0.8rem;
      opacity: 0.7;
    }

    /* Project picker popup, drops below the top-left trigger */
    .cam-project-popup {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0.75rem) + 50px);
      left: 0.9rem;
      min-width: 220px;
      max-width: 70vw;
      max-height: 60vh;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 14px;
      padding: 0.4rem;
      overflow-y: auto;
      z-index: 30;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    .cam-project-popup .item {
      display: flex;
      align-items: center;
      padding: 0.7rem 0.85rem;
      border-radius: 10px;
      color: #fff;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .cam-project-popup .item:active { background: rgba(255,255,255,0.08); }
    .cam-project-popup .item.active {
      background: rgba(255,255,255,0.12);
      font-weight: 600;
    }
    .cam-project-popup .item.new {
      color: #ffd60a;
      border-top: 1px solid rgba(255,255,255,0.1);
      margin-top: 0.2rem;
      padding-top: 0.8rem;
    }
    .cam-project-popup .empty {
      padding: 0.8rem 0.85rem;
      color: #98989d;
      font-size: 0.85rem;
      text-align: center;
    }

    /* Mode toggle: VIDEO/PHOTO style — pill with two segments */
    .cam-mode {
      display: flex;
      gap: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 999px;
      padding: 0.2rem;
    }
    .cam-mode-btn {
      padding: 0.4rem 0.85rem;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #d6d6d6;
      border-radius: 999px;
    }
    .cam-mode-btn.active {
      color: #ffd60a;
    }

    /* Shutter (centered, just above the bottom bar) */
    .cam-shutter {
      position: absolute;
      left: 50%;
      bottom: calc(max(env(safe-area-inset-bottom, 1rem), 1rem) + 70px);
      transform: translateX(-50%);
      width: 78px;
      height: 78px;
      border-radius: 999px;
      background: #fff;
      border: 4px solid rgba(255,255,255,0.55);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.2);
      transition: transform 0.07s ease, opacity 0.15s ease;
      z-index: 12;
    }
    .cam-shutter:active { transform: translateX(-50%) scale(0.92); background: #ddd; }
    .cam-shutter.disabled {
      opacity: 0.35;
      pointer-events: none;
    }

    /* Bottom bar: thumbnail | mode | flip */
    .cam-bottom-bar {
      position: absolute;
      left: 0; right: 0;
      bottom: max(env(safe-area-inset-bottom, 0.75rem), 0.75rem);
      padding: 0 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 11;
    }

    .cam-thumb {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      background-size: cover;
      background-position: center;
      background-color: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.85);
      overflow: hidden;
    }
    .cam-thumb.empty {
      background-color: rgba(0,0,0,0.55);
      border-color: rgba(255,255,255,0.4);
    }

    .cam-error {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      color: #eee;
      background: rgba(0,0,0,0.85);
      z-index: 20;
    }

    /* ============ CAPTURE ============ */
    #view-capture { padding: 0 0 1.5rem; }

    #capture-preview {
      width: 100%;
      max-height: 38vh;
      object-fit: contain;
      border-radius: 14px;
      background: var(--bg-elev-2);
    }

    .step-question {
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin: 0.25rem 0 0.6rem;
    }

    .type-buttons { display: grid; gap: 0.5rem; }

    .type-btn {
      padding: 0.95rem 1.1rem;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      text-align: left;
      line-height: 1.3;
    }
    .type-btn:active { background: var(--bg-elev-2); }
    .type-btn strong {
      display: block;
      font-weight: 600;
      font-size: 1.05rem;
      letter-spacing: -0.01em;
      margin-bottom: 0.15rem;
    }
    .type-btn span { color: var(--text-muted); font-size: 0.85rem; }

    /* Chip grids */
    .chip-group { margin-bottom: 0.75rem; }

    .chip-group-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin: 0 0 0.4rem;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .chip {
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      background: var(--pill-bg);
      border: 0;
      color: var(--text);
      font-size: 0.9rem;
      line-height: 1;
      transition: opacity 0.1s ease;
    }
    .chip:active { opacity: 0.6; }
    .chip.active {
      background: var(--pill-active-bg);
      color: var(--pill-active-text);
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-bottom: 0.75rem;
    }

    .form-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .form-input {
      padding: 0.7rem 0.85rem;
      border-radius: 10px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1rem;
      width: 100%;
    }
    .form-input:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }

    .capture-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .capture-actions button {
      flex: 1;
      padding: 0.85rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:active { opacity: 0.7; }

    .btn-secondary {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-secondary:active { background: var(--bg-elev-2); }

    .label-photo-box {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem;
      background: var(--bg-elev-2);
      border-radius: 10px;
      margin-bottom: 0.75rem;
    }

    .label-photo-box img {
      width: 44px;
      height: 44px;
      object-fit: cover;
      border-radius: 6px;
      background: var(--bg-elev);
    }

    .label-photo-box .label-meta {
      flex: 1;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .label-photo-box .label-remove {
      color: var(--danger);
      font-size: 0.85rem;
      padding: 0.35rem 0.6rem;
    }


    /* ============ GALLERY ============ */
    #view-gallery { padding: 0 0 2rem; }

    .gallery-header {
      display: flex;
      align-items: center;
      padding: 0.6rem 1rem;
      gap: 0.6rem;
      position: sticky;
      top: 0;
      background: color-mix(in srgb, var(--bg) 80%, transparent);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      z-index: 10;
      min-height: 44px;
    }

    .back-btn {
      font-size: 1.5rem;
      padding: 0.2rem 0.4rem;
      color: var(--accent);
      line-height: 1;
    }

    .search-input {
      flex: 1;
      padding: 0.55rem 0.9rem;
      border-radius: 10px;
      background: var(--pill-bg);
      border: 0;
      color: var(--text);
      font-size: 0.95rem;
    }
    .search-input::placeholder { color: var(--text-faint); }
    .search-input:focus { outline: 2px solid var(--accent); }

    .type-filter-row {
      display: flex;
      gap: 0.4rem;
      padding: 0 1rem 0.6rem;
      overflow-x: auto;
    }

    #count {
      padding: 0 1rem 0.5rem;
      font-family: var(--font-mono);
      color: var(--text-faint);
      font-size: 0.78rem;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      padding: 0 2px;
    }

    .photo-grid .tile {
      position: relative;
      aspect-ratio: 1;
      background: var(--bg-elev-2);
      cursor: pointer;
      overflow: hidden;
    }

    .photo-grid img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-grid .type-badge {
      position: absolute;
      top: 6px;
      left: 6px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      color: #fff;
      font-family: var(--font-mono);
      font-size: 0.62rem;
      padding: 2px 6px;
      border-radius: 999px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    /* ============ DETAIL ============ */
    #view-detail { padding: 0 1rem 2rem; gap: 1rem; }

    #detail-img {
      width: 100%;
      max-height: 50vh;
      object-fit: contain;
      border-radius: 14px;
      background: var(--bg-elev-2);
    }

    .section {
      background: var(--bg-elev);
      border-radius: 14px;
      padding: 0.9rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .section-title {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 0 0 0.15rem;
    }

    .keyword-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    .keyword-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.7rem;
      background: var(--pill-bg);
      border: 0;
      border-radius: 999px;
      color: var(--text);
      font-size: 0.85rem;
    }

    .keyword-tag .remove {
      color: var(--text-faint);
      cursor: pointer;
    }

    .keyword-input {
      padding: 0.5rem 0.85rem;
      border-radius: 10px;
      background: var(--pill-bg);
      border: 0;
      color: var(--text);
      font-size: 0.9rem;
      flex: 1;
      min-width: 100px;
    }
    .keyword-input::placeholder { color: var(--text-faint); }

    .meta-date {
      font-family: var(--font-mono);
      color: var(--text-muted);
      font-size: 0.78rem;
      letter-spacing: 0.01em;
    }

    #delete-btn {
      margin-top: 0.5rem;
      padding: 0.85rem;
      border-radius: 12px;
      background: var(--bg-elev);
      border: 0;
      color: var(--danger);
      font-size: 1rem;
      font-weight: 500;
    }
    #delete-btn:active { background: var(--bg-elev-2); }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(2rem);
      background: var(--bg-elev);
      color: var(--text);
      padding: 0.7rem 1.2rem;
      border-radius: 999px;
      font-size: 0.92rem;
      font-weight: 500;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>


  <!-- ============ SETTINGS ============ -->
  <section id="view-settings" class="view">
    <header class="gallery-header">
      <button class="back-btn" data-goto="home">&larr;</button>
      <span class="meta-date">Options</span>
    </header>
    <div style="padding: 0 1rem; display:flex; flex-direction:column; gap:1rem;">

      <div class="section">
        <p class="section-title">Projects</p>
        <div id="settings-projects-list"></div>
      </div>

      <div class="section">
        <p class="section-title">Building flow steps</p>
        <p style="margin:0 0 0.5rem; color:#888; font-size:0.78rem;">Which questions to ask after picking Building.</p>
        <div id="settings-steps-list"></div>
      </div>

      <div class="section">
        <p class="section-title">Custom typologies</p>
        <div id="settings-custom-typology"></div>
      </div>

      <div class="section">
        <p class="section-title">Custom concepts</p>
        <div id="settings-custom-concept"></div>
      </div>

      <div class="section">
        <p class="section-title">Custom materials</p>
        <div id="settings-custom-materiality"></div>
      </div>

    </div>
  </section>

  <!-- ============ HOME = CAMERA (custom getUserMedia camera) ============ -->
  <section id="view-camera" class="view active">
    <video id="cam-video" class="cam-video" playsinline webkit-playsinline autoplay muted></video>

    <!-- Top bar: project trigger (left), options (right) -->
    <div class="cam-top">
      <button class="cam-pill cam-project-trigger" id="cam-project-trigger">
        <span id="cam-project-label">Reference</span>
        <span class="cam-caret" id="cam-project-caret" hidden>&#9662;</span>
      </button>
      <button class="cam-pill cam-icon" id="cam-options" aria-label="Options">&#8943;</button>
    </div>

    <!-- Project picker popup, anchored under the top-left trigger -->
    <div class="cam-project-popup" id="cam-project-popup" hidden></div>

    <!-- Centered shutter sits above the bottom bar -->
    <button class="cam-shutter" id="cam-shutter" aria-label="Take photo"></button>

    <!-- Bottom bar: gallery thumbnail (left), mode toggle (center), flip (right) -->
    <div class="cam-bottom-bar">
      <button class="cam-thumb empty" id="cam-thumb" aria-label="Gallery"></button>
      <div class="cam-mode">
        <button class="cam-mode-btn active" data-cam-mode="reference">Reference</button>
        <button class="cam-mode-btn" data-cam-mode="project">Project</button>
      </div>
      <button class="cam-pill cam-icon" id="cam-flip" aria-label="Switch camera">&#8634;</button>
    </div>

    <div class="cam-error" id="cam-error" hidden></div>
  </section>

  <!-- ============ CAPTURE ============ -->
  <section id="view-capture" class="view">
    <header class="gallery-header">
      <button class="back-btn" id="capture-back">&larr;</button>
      <span class="meta-date" id="capture-step-label"></span>
    </header>
    <div style="padding: 0 1rem; display:flex; flex-direction:column; gap:1rem;">
      <img id="capture-preview" alt="">
      <div id="capture-step-container"></div>
    </div>
  </section>

  <!-- ============ GALLERY ============ -->
  <section id="view-gallery" class="view">
    <header class="gallery-header">
      <button class="back-btn" data-goto="home">&larr;</button>
      <input type="search" class="search-input" id="search-input" placeholder="Search (e.g. railing, school, colorful)">
    </header>

    <div class="type-filter-row" id="type-filter-row">
      <button class="chip active" data-type-filter="all">All</button>
      <button class="chip" data-type-filter="building">Building</button>
      <button class="chip" data-type-filter="element">Element</button>
      <button class="chip" data-type-filter="graphic">Graphic</button>
    </div>

    <div class="type-filter-row" id="project-filter-row" hidden></div>

    <div id="count"></div>
    <div id="photo-grid" class="photo-grid"></div>
    <p id="empty" class="empty-state" hidden>No photos yet.</p>
  </section>

  <!-- ============ DETAIL / ENRICH ============ -->
  <section id="view-detail" class="view">
    <header class="gallery-header">
      <button class="back-btn" data-goto="gallery">&larr;</button>
      <span class="meta-date" id="detail-date"></span>
    </header>
    <img id="detail-img" alt="">
    <div id="detail-body"></div>
    <button id="delete-btn">Delete photo</button>
  </section>

  <!-- Hidden file input (only used by detail view to attach a label photo to artworks) -->
  <input id="label-input" class="hidden-file" type="file" accept="image/*" capture="environment">

  <div id="toast"></div>

  <script>
    // ============================================================
    // TAXONOMY (v3)
    // ============================================================
    const TYPES = [
      { id: 'building', label: 'Building', hint: 'A whole building or space' },
      { id: 'element',  label: 'Element',  hint: 'A part or detail (railing, stair, tile...)' },
      { id: 'graphic',  label: 'Graphic',  hint: 'Flat: artwork, book, drawing, product, contact...' },
    ];

    const TYPOLOGY = [
      'Residential', 'Office', 'Cultural', 'Educational', 'Religious',
      'Civic', 'Commercial', 'Hospitality', 'Industrial', 'Heritage/Ruin', 'Other'
    ];

    const CONCEPTS = [
      { id: 'form',        label: 'Form',        hint: 'massing, geometry, composition' },
      { id: 'space',       label: 'Space',       hint: 'enclosure, sequence, proportion' },
      { id: 'light',       label: 'Light',       hint: 'daylight, shadow, atmosphere' },
      { id: 'materiality', label: 'Materiality', hint: 'surface, texture, tactility' },
      { id: 'structure',   label: 'Structure',   hint: 'tectonics, load' },
      { id: 'context',     label: 'Context',     hint: 'site, landscape, urban' },
      { id: 'circulation', label: 'Circulation', hint: 'movement, threshold, path' },
      { id: 'craft',       label: 'Craft',       hint: 'joint, junction, made-ness' },
    ];

    const ELEMENT_GROUPS = {
      Structural:  ['Column', 'Beam', 'Wall', 'Arch', 'Vault', 'Dome', 'Truss'],
      Circulation: ['Door', 'Window', 'Stair', 'Ramp', 'Corridor', 'Threshold', 'Balcony'],
      Enclosure:   ['Roof', 'Ceiling', 'Floor', 'Facade'],
      Ornament:    ['Cornice', 'Railing', 'Joint', 'Pavement'],
    };

    const MATERIALS = [
      'Concrete', 'Brick/Masonry', 'Stone', 'Timber', 'Steel', 'Other Metals',
      'Glass', 'Earth/Rammed', 'Ceramic/Tile', 'Plaster/Render', 'Textile/Soft'
    ];

    const GRAPHIC_KINDS = [
      { id: 'artwork', label: 'Artwork', hint: 'painting, sculpture' },
      { id: 'book',    label: 'Book',    hint: 'page, article' },
      { id: 'drawing', label: 'Drawing', hint: 'sketch, plan' },
      { id: 'product', label: 'Product', hint: 'lamp, chair, spec' },
      { id: 'contact', label: 'Contact', hint: 'business card' },
      { id: 'other',   label: 'Other',   hint: 'note, sign, receipt' },
    ];

    const VISUAL = [
      'Colorful', 'Monochrome', 'Textured', 'Minimal', 'Patterned',
      'Ornate', 'Dark', 'Light'
    ];

    // ============================================================
    // STATE
    // ============================================================
    let pendingBlob = null;       // primary photo during capture
    let pendingLabelBlob = null;  // optional label photo during capture
    let captureDraft = null;      // tags_human being built during capture
    let captureStep = null;       // current step name
    let captureBackStack = [];    // history of steps visited (for back button)

    let activeFilters = { type: 'all', search: '', project: null };
    let currentDetailId = null;
    let currentDetailRecord = null;
    let objectUrls = [];

    // For label-input: context-dependent behaviour
    let labelInputTarget = null;  // 'capture' | 'detail'

    // Home-path state: which mode the next camera tap is in
    let captureMode = 'reference';  // 'reference' | 'project'
    let activeProject = null;

    // Location captured async between tapping the camera button and saving.
    let pendingLocation = null;     // { lat, lng, accuracy } or null

    function startLocationCapture() {
      pendingLocation = null;
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          pendingLocation = {
            lat: pos.coords.latitude,
            lng: pos.coords.longitude,
            accuracy: pos.coords.accuracy,
          };
        },
        () => { /* denied or failed; save without location */ },
        { enableHighAccuracy: false, timeout: 8000, maximumAge: 60000 }
      );
    }

    function takePendingLocation() {
      const loc = pendingLocation;
      pendingLocation = null;
      return loc;
    }

    // ============================================================
    // SETTINGS (per-user customisation, stored in localStorage)
    // ============================================================
    const SETTINGS_KEY = 'archi-archive:settings';

    function loadSettings() {
      try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; }
      catch { return {}; }
    }
    function saveSettings(s) {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
    }

    function getCustom(category) {
      return (loadSettings().custom || {})[category] || [];
    }
    function setCustom(category, items) {
      const s = loadSettings();
      s.custom = s.custom || {};
      s.custom[category] = items;
      saveSettings(s);
    }
    function getStepEnabled(section) {
      // default true
      return (loadSettings().buildingSteps || {})[section] !== false;
    }
    function setStepEnabled(section, enabled) {
      const s = loadSettings();
      s.buildingSteps = s.buildingSteps || {};
      s.buildingSteps[section] = enabled;
      saveSettings(s);
    }

    // User-created project names that may not yet have any photos.
    function getStoredProjects() {
      return loadSettings().projects || [];
    }
    function addStoredProject(name) {
      const s = loadSettings();
      s.projects = s.projects || [];
      if (!s.projects.some(p => p.toLowerCase() === name.toLowerCase())) {
        s.projects.push(name);
        saveSettings(s);
      }
    }
    function removeStoredProject(name) {
      const s = loadSettings();
      s.projects = (s.projects || []).filter(p => p !== name);
      saveSettings(s);
    }

    function getEffectiveTypology() {
      return [...TYPOLOGY, ...getCustom('typology')];
    }
    function getEffectiveConcepts() {
      return [...CONCEPTS, ...getCustom('concept').map(label => ({
        id: 'custom_' + label.toLowerCase().replace(/[^a-z0-9]/g, '_'),
        label,
      }))];
    }
    function getEffectiveMaterials() {
      return [...MATERIALS, ...getCustom('materiality')];
    }

    // Building flow steps in order, each tied to a settings section key.
    const BUILDING_STEP_ORDER = [
      { step: 'primary-building',              section: 'typology' },
      { step: 'primary-building-concepts',     section: 'concept' },
      { step: 'primary-building-materiality',  section: 'materiality' },
      { step: 'primary-building-meta',         section: 'architect_year' },
      { step: 'primary-building-note',         section: 'note' },
    ];
    const BUILDING_STEP_LABELS = {
      typology:       'Typology',
      concept:        'Concepts',
      materiality:    'Materiality',
      architect_year: 'Architect & year',
      note:           'Personal note',
    };

    function nextEnabledBuildingStep(currentStep) {
      const idx = BUILDING_STEP_ORDER.findIndex(s => s.step === currentStep);
      for (let i = idx + 1; i < BUILDING_STEP_ORDER.length; i++) {
        if (getStepEnabled(BUILDING_STEP_ORDER[i].section)) return BUILDING_STEP_ORDER[i].step;
      }
      return null;
    }

    // After picking Building at the type step, jump directly to the first enabled section.
    function firstEnabledBuildingStep() {
      for (const s of BUILDING_STEP_ORDER) {
        if (getStepEnabled(s.section)) return s.step;
      }
      return null;
    }

    // ============================================================
    // INDEXEDDB
    // ============================================================
    const DB_NAME = 'archi-archive';
    const STORE = 'photos';
    const DB_VERSION = 2;   // v3 app / db version 2 (v2 app was db version 1)
    let dbPromise = null;

    function openDb() {
      if (dbPromise) return dbPromise;
      dbPromise = new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (event) => {
          const db = req.result;
          // v3 schema change is big enough that we wipe and recreate
          if (db.objectStoreNames.contains(STORE)) {
            db.deleteObjectStore(STORE);
          }
          db.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
      return dbPromise;
    }

    async function dbAdd(record) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const req = db.transaction(STORE, 'readwrite').objectStore(STORE).add(record);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function dbPut(record) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const req = db.transaction(STORE, 'readwrite').objectStore(STORE).put(record);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function dbGetAll() {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const req = db.transaction(STORE, 'readonly').objectStore(STORE).getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function dbGet(id) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const req = db.transaction(STORE, 'readonly').objectStore(STORE).get(id);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function dbDelete(id) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const req = db.transaction(STORE, 'readwrite').objectStore(STORE).delete(id);
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
      });
    }

    // ============================================================
    // SEARCH INDEX — flatten all tag values into a searchable string
    // ============================================================
    function buildSearchText(record) {
      const t = record.tags_human || {};
      const parts = [
        t.type, t.typology, t.typology_note,
        ...(t.concepts || []), t.concepts_note,
        t.element_name, t.element_note, t.material,
        ...(t.materials || []), t.materials_note,
        t.graphic_kind,
        t.title, t.creator, t.year, t.source,
        t.brand, t.model,
        t.contact_name, t.contact_company,
        t.project,
        t.note,
        ...(t.visual || []),
        ...(t.keywords || []),
      ];
      return parts.filter(Boolean).join(' ').toLowerCase();
    }

    // ============================================================
    // VIEW SWITCHING
    // ============================================================
    function showView(name) {
      // 'home' is now the camera
      if (name === 'home') name = 'camera';
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      const view = document.getElementById('view-' + name);
      if (!view) return;
      view.classList.add('active');
      window.scrollTo(0, 0);

      // Camera stream lifecycle: only run while the camera view is active.
      if (name === 'camera') {
        updateCameraModeUI();
        hideCameraError();
        startCameraStream();
        refreshCameraThumb();
      } else {
        stopCameraStream();
        closeProjectPopup();
      }
    }

    document.querySelectorAll('[data-goto]').forEach(btn => {
      btn.addEventListener('click', () => showView(btn.dataset.goto));
    });

    // ============================================================
    // CAPTURE — tagging flow (camera lives in its own view, see CAMERA section)
    // ============================================================
    const stepContainer = document.getElementById('capture-step-container');

    // ============================================================
    // CUSTOM CAMERA (replaces native file-input camera)
    // ============================================================
    let mediaStream = null;
    let cameraFacing = 'environment';   // 'environment' | 'user'
    let cameraStarting = false;

    async function startCameraStream() {
      if (mediaStream || cameraStarting) return;
      cameraStarting = true;
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error('Camera API unavailable. The site must be served over HTTPS.');
        }
        mediaStream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: cameraFacing },
            width:  { ideal: 4096 },
            height: { ideal: 2160 },
          },
          audio: false,
        });
        const video = document.getElementById('cam-video');
        video.srcObject = mediaStream;
        // Don't await play(); the autoplay attribute starts it. Awaiting here
        // can swallow iOS NotAllowedError silently when the doc isn't yet visible.
        const p = video.play();
        if (p && p.catch) p.catch(err => showCameraError('Preview blocked: ' + (err.message || err.name)));
      } catch (err) {
        const name = (err && err.name) ? err.name + ': ' : '';
        showCameraError(name + (err && err.message ? err.message : 'Could not start the camera.'));
        if (mediaStream) {
          mediaStream.getTracks().forEach(t => t.stop());
          mediaStream = null;
        }
      } finally {
        cameraStarting = false;
      }
    }

    function stopCameraStream() {
      if (mediaStream) {
        mediaStream.getTracks().forEach(t => t.stop());
        mediaStream = null;
      }
      const video = document.getElementById('cam-video');
      if (video) video.srcObject = null;
    }

    function showCameraError(msg) {
      const el = document.getElementById('cam-error');
      el.textContent = msg;
      el.hidden = false;
    }
    function hideCameraError() {
      document.getElementById('cam-error').hidden = true;
    }

    document.getElementById('cam-options').addEventListener('click', async () => {
      await renderSettings();
      showView('settings');
    });

    document.getElementById('cam-flip').addEventListener('click', async () => {
      cameraFacing = (cameraFacing === 'environment') ? 'user' : 'environment';
      stopCameraStream();
      await startCameraStream();
    });

    document.querySelectorAll('[data-cam-mode]').forEach(btn => {
      btn.addEventListener('click', () => switchCameraMode(btn.dataset.camMode));
    });

    // Projects the user typed in this session but haven't saved a photo into yet.
    let pendingNewProjects = [];

    // Reference mode: when set, the next shutter press auto-saves with these tags.
    // Stays on across multiple shots until the user picks "New tagging" or switches mode.
    let referenceReuseTags = null;

    function updateCameraModeUI() {
      document.querySelectorAll('[data-cam-mode]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.camMode === captureMode);
      });
      const trigger = document.getElementById('cam-project-trigger');
      const label = document.getElementById('cam-project-label');
      const caret = document.getElementById('cam-project-caret');
      const shutter = document.getElementById('cam-shutter');

      if (captureMode === 'project') {
        if (activeProject) {
          label.textContent = activeProject;
          trigger.classList.add('active');
        } else {
          label.textContent = 'Pick project';
          trigger.classList.remove('active');
        }
        caret.hidden = false;
        shutter.classList.toggle('disabled', !activeProject);
      } else if (referenceReuseTags) {
        label.textContent = '↻ ' + summariseReuseTags(referenceReuseTags);
        caret.hidden = false;
        trigger.classList.add('active');
        shutter.classList.remove('disabled');
      } else {
        label.textContent = 'Reference';
        caret.hidden = false;
        trigger.classList.remove('active');
        shutter.classList.remove('disabled');
      }
    }

    function summariseReuseTags(t) {
      const parts = [];
      if (t.typology) parts.push(t.typology);
      if (t.element_name) parts.push(t.element_name);
      if (t.creator) parts.push(t.creator);
      if (parts.length === 0 && (t.materials || []).length) parts.push(t.materials[0]);
      if (parts.length === 0) parts.push('Reuse');
      return parts.slice(0, 2).join(' · ');
    }

    async function switchCameraMode(mode) {
      if (mode === 'reference') {
        captureMode = 'reference';
        closeProjectPopup();
        updateCameraModeUI();
        return;
      }
      // mode === 'project' — reuse mode is reference-only, so clear it.
      captureMode = 'project';
      referenceReuseTags = null;
      updateCameraModeUI();
      // If no project selected yet, open the picker so the user can choose immediately.
      if (!activeProject) await openProjectPopup();
    }

    // ----- Project picker popup -----
    async function openProjectPopup() {
      const popup = document.getElementById('cam-project-popup');
      popup.innerHTML = '';

      const dbProjects = await getProjectNames();
      const all = [...new Set([...dbProjects, ...pendingNewProjects])];

      if (all.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'No projects yet.';
        popup.appendChild(empty);
      } else {
        all.forEach(name => {
          const item = document.createElement('div');
          item.className = 'item';
          if (activeProject === name) item.classList.add('active');
          item.textContent = name;
          item.addEventListener('click', () => {
            activeProject = name;
            captureMode = 'project';
            closeProjectPopup();
            updateCameraModeUI();
          });
          popup.appendChild(item);
        });
      }

      const addItem = document.createElement('div');
      addItem.className = 'item new';
      addItem.textContent = '+ New project';
      addItem.addEventListener('click', addInlineProject);
      popup.appendChild(addItem);

      popup.hidden = false;
    }

    function closeProjectPopup() {
      document.getElementById('cam-project-popup').hidden = true;
    }

    document.getElementById('cam-project-trigger').addEventListener('click', async () => {
      const popup = document.getElementById('cam-project-popup');
      if (!popup.hidden) {
        closeProjectPopup();
        return;
      }
      if (captureMode === 'project') await openProjectPopup();
      else await openReferencePopup();
    });

    async function openReferencePopup() {
      const popup = document.getElementById('cam-project-popup');
      popup.innerHTML = '';

      // "New tagging" — clears any reuse setting.
      const newItem = document.createElement('div');
      newItem.className = 'item';
      if (!referenceReuseTags) newItem.classList.add('active');
      newItem.textContent = 'New tagging';
      newItem.addEventListener('click', () => {
        referenceReuseTags = null;
        closeProjectPopup();
        updateCameraModeUI();
      });
      popup.appendChild(newItem);

      // "Reuse last" — shows the most recent reference photo's tags.
      const last = await getMostRecentReferenceTags();
      if (last) {
        const reuse = document.createElement('div');
        reuse.className = 'item';
        if (referenceReuseTags) reuse.classList.add('active');
        reuse.innerHTML = `↻ Reuse last <span style="opacity:0.6; margin-left:0.4rem; font-weight:400; font-size:0.85rem;">${summariseReuseTags(last)}</span>`;
        reuse.addEventListener('click', () => {
          referenceReuseTags = last;
          closeProjectPopup();
          updateCameraModeUI();
        });
        popup.appendChild(reuse);
      } else {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'Take and tag a reference photo first to enable reuse.';
        popup.appendChild(empty);
      }

      popup.hidden = false;
    }

    async function getMostRecentReferenceTags() {
      const all = await dbGetAll();
      if (all.length === 0) return null;
      const refs = all
        .filter(r => r.tags_human && !r.tags_human.project)
        .sort((a, b) => b.created_at - a.created_at);
      if (refs.length === 0) return null;
      const t = refs[0].tags_human;
      // Copy only the tag fields, not blobs/dates/coords.
      return {
        type: t.type, typology: t.typology, typology_note: t.typology_note,
        concepts: [...(t.concepts || [])], concepts_note: t.concepts_note,
        element_name: t.element_name, element_note: t.element_note,
        material: t.material,
        materials: [...(t.materials || [])], materials_note: t.materials_note,
        graphic_kind: t.graphic_kind,
        title: t.title, creator: t.creator, year: t.year, source: t.source,
        brand: t.brand, model: t.model,
        contact_name: t.contact_name, contact_company: t.contact_company,
        visual: [...(t.visual || [])],
        keywords: [...(t.keywords || [])],
        note: t.note,
      };
    }

    // Tap outside the popup to dismiss.
    document.addEventListener('click', (e) => {
      const popup = document.getElementById('cam-project-popup');
      if (popup.hidden) return;
      const trigger = document.getElementById('cam-project-trigger');
      if (popup.contains(e.target) || trigger.contains(e.target)) return;
      closeProjectPopup();
    });

    async function addInlineProject() {
      const raw = prompt('Project name');
      if (raw == null) return;
      const name = raw.trim();
      if (!name) return;
      const existing = await getProjectNames();
      const all = [...existing, ...pendingNewProjects];
      const match = all.find(p => p.toLowerCase() === name.toLowerCase());
      const finalName = match || name;
      if (!match) pendingNewProjects.push(finalName);
      activeProject = finalName;
      captureMode = 'project';
      closeProjectPopup();
      updateCameraModeUI();
    }

    // ----- Gallery thumbnail (bottom-left) -----
    let camThumbUrl = null;
    async function refreshCameraThumb() {
      const all = await dbGetAll();
      const thumb = document.getElementById('cam-thumb');
      if (!thumb) return;
      if (all.length === 0) {
        if (camThumbUrl) { URL.revokeObjectURL(camThumbUrl); camThumbUrl = null; }
        thumb.style.backgroundImage = '';
        thumb.classList.add('empty');
        return;
      }
      const latest = all.reduce((a, b) => (a.created_at > b.created_at ? a : b));
      if (camThumbUrl) URL.revokeObjectURL(camThumbUrl);
      camThumbUrl = URL.createObjectURL(latest.blob);
      thumb.style.backgroundImage = `url("${camThumbUrl}")`;
      thumb.classList.remove('empty');
    }

    document.getElementById('cam-thumb').addEventListener('click', async () => {
      showView('gallery');
      await renderGallery();
    });

    async function shutterPressed() {
      if (captureMode === 'project' && !activeProject) {
        toast('Pick or add a project first');
        return;
      }
      const blob = await captureFrame();
      if (!blob) return;
      if (captureMode === 'project') {
        // Stay in the camera so the user can immediately shoot the next photo.
        await savePhotoToProject(blob);
        return;
      }
      // Reference mode
      if (referenceReuseTags) {
        // Auto-save with the reused tags; stay in the camera.
        pendingBlob = blob;
        pendingLabelBlob = null;
        captureDraft = { ...referenceReuseTags };
        captureBackStack = [];
        captureStep = null;
        await finishCapture();
        toast('Saved (reused tags)');
        return;
      }
      stopCameraStream();
      startReferenceTagging(blob);
    }
    document.getElementById('cam-shutter').addEventListener('click', shutterPressed);

    async function captureFrame() {
      const video = document.getElementById('cam-video');
      if (!video) return null;
      // Wait briefly for the first frame if the user taps very fast.
      if (!video.videoWidth) {
        await new Promise(resolve => {
          const t = setTimeout(resolve, 800);
          video.addEventListener('loadeddata', () => { clearTimeout(t); resolve(); }, { once: true });
        });
      }
      if (!video.videoWidth) {
        toast('Camera not ready, try again');
        return null;
      }
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
      return new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.92));
    }

    function startReferenceTagging(blob) {
      pendingBlob = blob;
      pendingLabelBlob = null;
      captureDraft = {};
      captureBackStack = [];
      captureStep = 'type';
      const preview = document.getElementById('capture-preview');
      const url = URL.createObjectURL(blob);
      objectUrls.push(url);
      preview.src = url;
      showView('capture');
      renderCaptureStep();
    }

    // The camera is the home; first-load location warm-up.
    startLocationCapture();

    async function renderSettings() {
      renderSettingsSteps();
      renderSettingsCustom('typology', 'settings-custom-typology');
      renderSettingsCustom('concept', 'settings-custom-concept');
      renderSettingsCustom('materiality', 'settings-custom-materiality');

      const list = document.getElementById('settings-projects-list');
      list.innerHTML = '';

      const all = await dbGetAll();
      const counts = new Map();
      all.slice().sort((a, b) => b.created_at - a.created_at).forEach(r => {
        const p = r.tags_human && r.tags_human.project;
        if (p) counts.set(p, (counts.get(p) || 0) + 1);
      });
      // Make stored-but-unphotographed projects show up too, with count 0.
      getStoredProjects().forEach(p => { if (!counts.has(p)) counts.set(p, 0); });

      if (counts.size === 0) {
        const p = document.createElement('p');
        p.style.margin = '0 0 0.6rem';
        p.style.color = '#888';

          row.appendChild(delBtn);

          list.appendChild(row);

      const addRow = document.createElement('div');
      addRow.style.display = 'flex';
      addRow.style.gap = '0.4rem';
      addRow.style.marginTop = '0.6rem';

      const input = document.createElement('input');

      addBtn.textContent = 'Add';

      const submit = async () => {
        const name = input.value.trim();

        input.value = '';

      input.addEventListener('keydown', e => {

    async function renameProject(oldName) {
      const raw = prompt(`Rename "${oldName}" to:`, oldName);
      if (raw == null) return;
      const newName = raw.trim();
      if (!newName || newName === oldName) return;

      const all = await dbGetAll();
      const collisions = all.filter(r =>
        r.tags_human && r.tags_human.project &&
        r.tags_human.project.toLowerCase() === newName.toLowerCase() &&
        r.tags_human.project !== oldName
      );
      if (collisions.length && !confirm(`A project called "${collisions[0].tags_human.project}" already exists. Merge them?`)) {
        return;
      }

      const targetName = collisions.length ? collisions[0].tags_human.project : newName;
      const affected = all.filter(r => r.tags_human && r.tags_human.project === oldName);
      for (const r of affected) {
        r.tags_human.project = targetName;
        r.search_text = buildSearchText(r);
        await dbPut(r);
      }
      // Mirror the rename in the stored-project list.
      removeStoredProject(oldName);
      addStoredProject(targetName);
      toast(`Renamed to ${targetName}`);
      await renderSettings();
    }

    async function deleteProject(name, count) {
      if (!confirm(`Delete project "${name}"? ${count} ${count === 1 ? 'photo' : 'photos'} will be untagged (the photos themselves stay).`)) return;
      const all = await dbGetAll();
      const affected = all.filter(r => r.tags_human && r.tags_human.project === name);
      for (const r of affected) {
        r.tags_human.project = null;
        r.search_text = buildSearchText(r);
        await dbPut(r);
      }
      removeStoredProject(name);
      toast(`Project removed`);
      await renderSettings();
    }

    // Back-button: pops the history stack; if empty, discards and goes home.

      'type': 'What is this?',
      'primary-building': 'Typology',
      'primary-building-concepts': 'Concepts',
      'primary-building-materiality': 'Materiality',
      'primary-building-meta': 'Architect & year',
      'primary-building-note': 'Note',
      'primary-element': 'Element',
      'primary-element-materiality': 'Materiality',
      'primary-element-note': 'Note',
      'primary-graphic': 'Graphic',
      'graphic-details': 'Details',
      'primary-graphic-note': 'Note',
    };

    function setCaptureStep(next) {
      if (captureStep) captureBackStack.push(captureStep);
      captureStep = next;
      renderCaptureStep();
    }

    document.getElementById('capture-back').addEventListener('click', () => {
      if (captureBackStack.length === 0) {
        resetCapture();
        showView('home');
        return;
      }
      captureStep = captureBackStack.pop();
      renderCaptureStep();
    });

    function resetCapture() {
      pendingBlob = null;
      pendingLabelBlob = null;
      captureDraft = null;
      captureStep = null;
      captureBackStack = [];
    }

    function renderCaptureStep() {
      const c = stepContainer;
      c.innerHTML = '';

      document.getElementById('capture-step-label').textContent = STEP_LABEL[captureStep] || '';

      if (captureStep === 'type') {
        renderTypeStep(c);
      } else if (captureStep === 'primary-building') {
        renderTypologyStep(c);
      } else if (captureStep === 'primary-building-concepts') {
        renderBuildingConceptsStep(c);
      } else if (captureStep === 'primary-building-materiality') {
        renderBuildingMaterialityStep(c);
      } else if (captureStep === 'primary-building-meta') {
        renderBuildingMetaStep(c);
      } else if (captureStep === 'primary-building-note') {
        renderNoteStep(c);
      } else if (captureStep === 'primary-element') {
        renderElementStep(c);
      } else if (captureStep === 'primary-element-materiality') {
        renderElementMaterialityStep(c);
      } else if (captureStep === 'primary-element-note') {
        renderNoteStep(c);
      } else if (captureStep === 'primary-graphic') {
        renderGraphicKindStep(c);
      } else if (captureStep === 'graphic-details') {
        renderGraphicDetailsStep(c);
      } else if (captureStep === 'primary-graphic-note') {
        renderNoteStep(c);
      }

    function renderTypeStep(c) {
      c.innerHTML = '<p class="step-question">What is this?</p>';
      const wrap = document.createElement('div');
      wrap.className = 'type-buttons';
      TYPES.forEach(t => {
        const btn = document.createElement('button');
        btn.className = 'type-btn';
        btn.innerHTML = `<strong>${t.label}</strong><span>${t.hint}</span>`;
        btn.addEventListener('click', () => {
          captureDraft.type = t.id;
          if (t.id === 'building') {
            const first = firstEnabledBuildingStep();
            if (first) setCaptureStep(first);
            else finishCapture();
          } else if (t.id === 'element') {
            setCaptureStep('primary-element');
          } else {
            setCaptureStep('primary-graphic');
          }
        });
        wrap.appendChild(btn);
      });
      c.appendChild(wrap);
    }

    function renderTypologyStep(c) {
      c.innerHTML = '<p class="step-question">Typology?</p>';
      const row = document.createElement('div');
      row.className = 'chip-row';
      getEffectiveTypology().forEach(t => {
        const chip = document.createElement('button');
        chip.className = 'chip';
        chip.textContent = t;
        if (captureDraft.typology === t) chip.classList.add('active');
        chip.addEventListener('click', () => {
          row.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
          if (captureDraft.typology === t) {
            captureDraft.typology = null;
          } else {
            captureDraft.typology = t;
            chip.classList.add('active');
          }
        });
        row.appendChild(chip);

      c.appendChild(row);
      appendNoteField(c, 'typology_note', 'Note about the typology…');
      addStepActions(c, 'Skip rest', finishCapture, 'Next', () => {
        const next = nextEnabledBuildingStep('primary-building');
        if (next) setCaptureStep(next);
        else finishCapture();
      });
    }

    function renderBuildingConceptsStep(c) {
      c.innerHTML = '<p class="step-question">Concepts (tap any that apply)</p>';
      if (!captureDraft.concepts) captureDraft.concepts = [];

      const row = document.createElement('div');
      row.className = 'chip-row';
      getEffectiveConcepts().forEach(concept => {
        const chip = document.createElement('button');
        chip.className = 'chip';
        chip.textContent = concept.label;
        if (captureDraft.concepts.includes(concept.id)) chip.classList.add('active');
        chip.addEventListener('click', () => {
          const idx = captureDraft.concepts.indexOf(concept.id);
          if (idx === -1) captureDraft.concepts.push(concept.id);
          else captureDraft.concepts.splice(idx, 1);
          chip.classList.toggle('active');
        });
        row.appendChild(chip);

    // ============================================================
    // LABEL-INPUT (shared by capture flow and detail view)
    // ============================================================
    const labelInput = document.getElementById('label-input');
    labelInput.addEventListener('change', async (event) => {
      const file = event.target.files[0];
      event.target.value = '';
      if (!file) return;

      if (labelInputTarget === 'capture') {
        pendingLabelBlob = file;
        renderCaptureLabelArea();
      } else if (labelInputTarget === 'detail' && currentDetailRecord) {
        currentDetailRecord.label_blob = file;
        await saveDetailRecord();
        renderDetail();
      }
      labelInputTarget = null;
    });

    // ============================================================
    // Finish capture — write to DB
    // ============================================================
    async function finishCapture() {
      const t = captureDraft;
      const record = {
        blob: pendingBlob,
        label_blob: pendingLabelBlob || null,
        created_at: Date.now(),
        location: takePendingLocation(),
        tags_human: {
          type: t.type,
          typology: t.typology || null,
          typology_note: t.typology_note || null,
          concepts: t.concepts || [],
          concepts_note: t.concepts_note || null,
          element_name: t.element_name || null,
          element_note: t.element_note || null,
          material: null,
          materials: t.materials || [],
          materials_note: t.materials_note || null,
          graphic_kind: t.graphic_kind || null,
          title: t.title || null,
          creator: t.creator || null,
          year: t.year || null,
          source: t.source || null,
          brand: t.brand || null,
          model: t.model || null,
          contact_name: t.contact_name || null,
          contact_company: t.contact_company || null,
          project: null,
          note: t.note || null,
          visual: [],
          keywords: [],
        },
        tags_machine: {},
      };
      record.search_text = buildSearchText(record);

      await dbAdd(record);
      resetCapture();
      showView('home');
      toast('Saved');
    }

    // ============================================================
    // PROJECT MODE
    // ============================================================
    async function getProjectNames() {
      const all = await dbGetAll();
      const seen = new Map();
      all.sort((a, b) => b.created_at - a.created_at).forEach(r => {
        const p = r.tags_human && r.tags_human.project;
        if (p && !seen.has(p)) seen.set(p, r.created_at);
      });
      // Also include user-created projects that don't yet have any photos.
      getStoredProjects().forEach(p => {
        if (!seen.has(p)) seen.set(p, 0);
      });
      return [...seen.keys()];
    }

    async function savePhotoToProject(file) {
      const record = {
        blob: file,
        label_blob: null,
        created_at: Date.now(),
        location: takePendingLocation(),
        tags_human: {
          type: null,
          typology: null,
          concepts: [],
          element_name: null,
          material: null,
          graphic_kind: null,
          title: null,
          creator: null,
          year: null,
          source: null,
          brand: null,
          model: null,
          contact_name: null,
          contact_company: null,
          project: activeProject,
          visual: [],
          keywords: [],
        },
        tags_machine: {},
      };
      record.search_text = buildSearchText(record);
      await dbAdd(record);

      // The project now exists in the DB; drop it from the pending list if present.
      pendingNewProjects = pendingNewProjects.filter(p => p !== activeProject);

      // Stay in the camera, restart location capture for the next shot.
      startLocationCapture();
      await refreshCameraThumb();
      toast('Saved to ' + activeProject);
    }

    // ============================================================
    // GALLERY
    // ============================================================
    document.getElementById('search-input').addEventListener('input', (e) => {
      activeFilters.search = e.target.value.trim().toLowerCase();
      renderGallery();
    });

    document.querySelectorAll('[data-type-filter]').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('[data-type-filter]').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeFilters.type = chip.dataset.typeFilter;
        renderGallery();
      });
    });

    async function renderGallery() {
      // free old object urls
      objectUrls.forEach(URL.revokeObjectURL);
      objectUrls = [];

      const all = await dbGetAll();
      renderProjectFilters(all);

      const queryWords = activeFilters.search.split(/\s+/).filter(Boolean);

      const filtered = all.filter(rec => {
        if (activeFilters.type !== 'all' && rec.tags_human.type !== activeFilters.type) return false;
        if (activeFilters.project && rec.tags_human.project !== activeFilters.project) return false;
        if (queryWords.length) {
          const text = rec.search_text || buildSearchText(rec);
          return queryWords.every(w => text.includes(w));
        }
        return true;
      });
      filtered.sort((a, b) => b.created_at - a.created_at);

      const grid = document.getElementById('photo-grid');
      grid.innerHTML = '';
      filtered.forEach(rec => {
        const tile = document.createElement('div');
        tile.className = 'tile';
        const img = document.createElement('img');
        const url = URL.createObjectURL(rec.blob);
        objectUrls.push(url);
        img.src = url;
        tile.appendChild(img);
        const badge = document.createElement('span');
        badge.className = 'type-badge';
        badge.textContent = (rec.tags_human.type || '?').slice(0, 1).toUpperCase();
        tile.appendChild(badge);
        tile.addEventListener('click', () => openDetail(rec.id));
        grid.appendChild(tile);
      });

      document.getElementById('count').textContent =
        `${filtered.length}${all.length !== filtered.length ? ' of ' + all.length : ''} ${filtered.length === 1 ? 'photo' : 'photos'}`;
      document.getElementById('empty').hidden = all.length !== 0;
    }

    function renderProjectFilters(all) {
      const row = document.getElementById('project-filter-row');

      // Count photos per project, ordered by most-recently-used project first.
      const counts = new Map();
      all.slice().sort((a, b) => b.created_at - a.created_at).forEach(r => {
        const p = r.tags_human && r.tags_human.project;
        if (p) counts.set(p, (counts.get(p) || 0) + 1);
      });

      if (counts.size === 0) {
        row.hidden = true;
        row.innerHTML = '';
        // Clear stale project filter if the last project just got deleted
        if (activeFilters.project) activeFilters.project = null;
        return;
      }

      row.hidden = false;
      row.innerHTML = '';
      counts.forEach((count, name) => {
        const chip = document.createElement('button');
        chip.className = 'chip';
        chip.textContent = `${name} (${count})`;
        if (activeFilters.project === name) chip.classList.add('active');
        chip.addEventListener('click', () => {
          activeFilters.project = (activeFilters.project === name) ? null : name;
          renderGallery();
        });
        row.appendChild(chip);
      });
    }

    // ============================================================
    // DETAIL + ENRICH (combined)
    // ============================================================
    async function openDetail(id) {
      const rec = await dbGet(id);
      if (!rec) return;
      currentDetailId = id;
      currentDetailRecord = rec;
      renderDetail();
      showView('detail');
    }

    function renderDetail() {
      const rec = currentDetailRecord;
      if (!rec) return;

      const img = document.getElementById('detail-img');
      const url = URL.createObjectURL(rec.blob);
      objectUrls.push(url);
      img.src = url;

      const dateEl = document.getElementById('detail-date');
      dateEl.innerHTML = '';
      dateEl.appendChild(document.createTextNode(new Date(rec.created_at).toLocaleString()));
      if (rec.location && rec.location.lat != null && rec.location.lng != null) {
        const sep = document.createElement('span');
        sep.textContent = ' · ';
        sep.style.color = '#555';
        dateEl.appendChild(sep);
        const link = document.createElement('a');
        link.href = `https://maps.apple.com/?q=${rec.location.lat},${rec.location.lng}`;
        link.target = '_blank';
        link.rel = 'noopener';
        link.style.color = '#aaa';
        link.style.textDecoration = 'none';
        link.textContent = `${rec.location.lat.toFixed(4)}, ${rec.location.lng.toFixed(4)}`;
        dateEl.appendChild(link);
      }

      const body = document.getElementById('detail-body');
      body.innerHTML = '';

      const type = rec.tags_human.type;

      // TYPE picker — editable so untagged (project) photos can be classified later
      body.appendChild(section('Type', buildChipPicker(
        TYPES.map(t => t.label), 'type', false, TYPES
      )));

      if (type === 'building') renderBuildingFields(body);
      if (type === 'element')  renderElementFields(body);
      if (type === 'graphic')  renderGraphicFields(body);

      // Universal sections
      renderProjectField(body);
      renderNoteField(body);
      renderVisualField(body);
      renderKeywordsField(body);
    }

    // Section helper that optionally appends an inline note textarea bound to a tags_human field.
    function sectionWithNote(title, contentEl, noteField) {
      const s = section(title, contentEl);
      if (!noteField) return s;
      const textarea = document.createElement('textarea');
      textarea.className = 'form-input';
      textarea.rows = 2;
      textarea.placeholder = 'Note for this…';
      textarea.style.marginTop = '0.5rem';
      textarea.value = currentDetailRecord.tags_human[noteField] || '';
      textarea.addEventListener('input', () => {
        currentDetailRecord.tags_human[noteField] = textarea.value.trim() || null;
      });
      textarea.addEventListener('blur', saveDetailRecord);
      s.appendChild(textarea);
      return s;
    }

    function section(title, contentEl) {
      const s = document.createElement('div');
      s.className = 'section';
      const h = document.createElement('p');
      h.className = 'section-title';
      h.textContent = title;
      s.appendChild(h);
      if (typeof contentEl === 'string') {
        const p = document.createElement('p');
        p.style.margin = 0;
        p.textContent = contentEl;
        s.appendChild(p);
      } else if (contentEl) {
        s.appendChild(contentEl);
      }
      return s;
    }

    // -------- Building fields --------
    function renderBuildingFields(body) {
      const concepts = getEffectiveConcepts();
      body.appendChild(sectionWithNote(
        'Typology', buildChipPicker(getEffectiveTypology(), 'typology', false), 'typology_note'
      ));
      body.appendChild(sectionWithNote(
        'Concepts (multi)', buildChipPicker(concepts.map(c => c.label), 'concepts', true, concepts), 'concepts_note'
      ));
      body.appendChild(sectionWithNote(
        'Materiality (multi)', buildChipPicker(getEffectiveMaterials(), 'materials', true), 'materials_note'
      ));
      body.appendChild(buildTextFieldsSection('Architect & year', [
        { field: 'creator', label: 'Architect' },
        { field: 'year',    label: 'Year' },
      ]));
    }

    // -------- Element fields --------
    function renderElementFields(body) {
      const wrap = document.createElement('div');
      Object.entries(ELEMENT_GROUPS).forEach(([group, items]) => {
        const g = document.createElement('div');
        g.className = 'chip-group';
        g.innerHTML = `<p class="chip-group-label">${group}</p>`;
        const row = buildChipPickerRow(items, 'element_name', false);
        g.appendChild(row);
        wrap.appendChild(g);
      });
      body.appendChild(sectionWithNote('Element', wrap, 'element_note'));
      body.appendChild(sectionWithNote(
        'Materiality (multi)', buildChipPicker(getEffectiveMaterials(), 'materials', true), 'materials_note'
      ));
    }

    // -------- Graphic fields --------
    function renderGraphicFields(body) {
      // Kind
      body.appendChild(section(
        'Kind',
        buildChipPicker(GRAPHIC_KINDS.map(k => k.label), 'graphic_kind', false, GRAPHIC_KINDS)
      ));

      const kind = currentDetailRecord.tags_human.graphic_kind;

      if (kind === 'artwork') {
        body.appendChild(renderArtworkDetailSection());
      } else if (kind === 'book') {
        body.appendChild(buildTextFieldsSection('Book', [
          { field: 'title', label: 'Title' },
          { field: 'creator', label: 'Author' },
        ]));
      } else if (kind === 'drawing') {
        body.appendChild(buildTextFieldsSection('Drawing', [
          { field: 'creator', label: 'Creator' },
          { field: 'title', label: 'Title' },
        ]));
      } else if (kind === 'product') {
        body.appendChild(buildTextFieldsSection('Product', [
          { field: 'brand', label: 'Brand' },
          { field: 'model', label: 'Model' },
          { field: 'source', label: 'Source' },
        ]));
      } else if (kind === 'contact') {
        body.appendChild(buildTextFieldsSection('Contact', [
          { field: 'contact_name', label: 'Name' },
          { field: 'contact_company', label: 'Company' },
        ]));
      }
    }

    function renderArtworkDetailSection() {
      const s = document.createElement('div');
      s.className = 'section';

      const title = document.createElement('p');
      title.className = 'section-title';
      title.textContent = 'Artwork';
      s.appendChild(title);

      // Label photo row
      const labelRow = document.createElement('div');
      const rec = currentDetailRecord;
      if (rec.label_blob) {
        const box = document.createElement('div');
        box.className = 'label-photo-box';
        const img = document.createElement('img');
        const url = URL.createObjectURL(rec.label_blob);
        objectUrls.push(url);
        img.src = url;
        box.appendChild(img);
        const meta = document.createElement('div');
        meta.className = 'label-meta';
        meta.textContent = 'Label photo';
        box.appendChild(meta);
        const rm = document.createElement('button');
        rm.className = 'label-remove';
        rm.textContent = 'Remove';
        rm.addEventListener('click', async () => {
          rec.label_blob = null;
          await saveDetailRecord();
          renderDetail();
        });
        box.appendChild(rm);
        labelRow.appendChild(box);
      } else {
        const btn = document.createElement('button');
        btn.className = 'btn-secondary';
        btn.style.width = '100%';
        btn.style.padding = '0.75rem';
        btn.style.borderRadius = '10px';
        btn.textContent = '+ Add label photo';
        btn.addEventListener('click', () => {
          labelInputTarget = 'detail';
          document.getElementById('label-input').click();
        });
        labelRow.appendChild(btn);
      }
      s.appendChild(labelRow);

      // Fields
      [
        { field: 'title', label: 'Title' },
        { field: 'creator', label: 'Artist' },
        { field: 'year', label: 'Year' },
        { field: 'source', label: 'Source / Where' },
      ].forEach(f => s.appendChild(buildTextInput(f.field, f.label)));

      return s;
    }

    function buildTextFieldsSection(title, fields) {
      const s = document.createElement('div');
      s.className = 'section';
      const h = document.createElement('p');
      h.className = 'section-title';
      h.textContent = title;
      s.appendChild(h);
      fields.forEach(f => s.appendChild(buildTextInput(f.field, f.label)));
      return s;
    }

    function buildTextInput(field, label) {
      const f = document.createElement('div');
      f.className = 'form-field';
      f.innerHTML = `<label class="form-label">${label}</label>`;
      const input = document.createElement('input');
      input.className = 'form-input';
      input.type = 'text';
      input.value = currentDetailRecord.tags_human[field] || '';
      input.addEventListener('input', () => {
        currentDetailRecord.tags_human[field] = input.value.trim() || null;
      });
      input.addEventListener('blur', saveDetailRecord);
      f.appendChild(input);
      return f;
    }

    // -------- Universal: Project --------
    function renderProjectField(body) {
      const s = document.createElement('div');
      s.className = 'section';
      const h = document.createElement('p');
      h.className = 'section-title';
      h.textContent = 'Project';
      s.appendChild(h);
      s.appendChild(buildTextInput('project', 'Project name (leave blank for none)'));
      body.appendChild(s);
    }

    // -------- Universal: Note --------
    function renderNoteField(body) {
      const s = document.createElement('div');
      s.className = 'section';
      const h = document.createElement('p');
      h.className = 'section-title';
      h.textContent = 'Note';
      s.appendChild(h);

      const textarea = document.createElement('textarea');
      textarea.className = 'form-input';
      textarea.rows = 3;
      textarea.placeholder = 'A line or two about why this caught your eye…';
      textarea.value = currentDetailRecord.tags_human.note || '';
      textarea.addEventListener('input', () => {
        currentDetailRecord.tags_human.note = textarea.value.trim() || null;
      });
      textarea.addEventListener('blur', saveDetailRecord);
      s.appendChild(textarea);
      body.appendChild(s);
    }

    // -------- Universal: Visual --------
    function renderVisualField(body) {
      body.appendChild(section('Visual character (multi)', buildChipPicker(VISUAL, 'visual', true)));
    }

    // -------- Universal: Keywords --------
    function renderKeywordsField(body) {
      const s = document.createElement('div');
      s.className = 'section';
      const h = document.createElement('p');
      h.className = 'section-title';
      h.textContent = 'Keywords';
      s.appendChild(h);

      const list = document.createElement('div');
      list.className = 'keyword-list';
      s.appendChild(list);

      const rec = currentDetailRecord;
      (rec.tags_human.keywords || []).forEach((kw, idx) => {
        const tag = document.createElement('span');
        tag.className = 'keyword-tag';
        tag.textContent = kw;
        const x = document.createElement('span');
        x.className = 'remove';
        x.textContent = '×';
        x.addEventListener('click', async () => {
          rec.tags_human.keywords.splice(idx, 1);
          await saveDetailRecord();
          renderDetail();
        });
        tag.appendChild(x);
        list.appendChild(tag);
      });

      const inputRow = document.createElement('div');
      inputRow.style.display = 'flex';
      inputRow.style.gap = '0.35rem';
      inputRow.style.marginTop = '0.3rem';

      const inp = document.createElement('input');
      inp.className = 'keyword-input';
      inp.placeholder = 'Add keyword…';
      inp.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          const kw = inp.value.trim().toLowerCase();
          if (!kw) return;
          if (!rec.tags_human.keywords) rec.tags_human.keywords = [];
          if (!rec.tags_human.keywords.includes(kw)) {
            rec.tags_human.keywords.push(kw);
            await saveDetailRecord();
            renderDetail();
          } else {
            inp.value = '';
          }
        }
      });
      inputRow.appendChild(inp);
      s.appendChild(inputRow);

      body.appendChild(s);
    }

    // -------- Helpers: generic chip-picker  --------
    function buildChipPicker(items, field, multi, meta) {
      return buildChipPickerRow(items, field, multi, meta);
    }

    function buildChipPickerRow(items, field, multi, meta) {
      const row = document.createElement('div');
      row.className = 'chip-row';
      const rec = currentDetailRecord;

      items.forEach(label => {
        // For concepts/graphic-kinds, store the .id; for others, the label itself
        const val = meta ? (meta.find(m => m.label === label)?.id || label) : label;

        const chip = document.createElement('button');
        chip.className = 'chip';
        chip.textContent = label;

        let isActive;
        if (multi) {
          isActive = (rec.tags_human[field] || []).includes(val);
        } else {
          isActive = rec.tags_human[field] === val;
        }
        if (isActive) chip.classList.add('active');

        chip.addEventListener('click', async () => {
          if (multi) {
            if (!rec.tags_human[field]) rec.tags_human[field] = [];
            const arr = rec.tags_human[field];
            const idx = arr.indexOf(val);
            if (idx === -1) arr.push(val);
            else arr.splice(idx, 1);
          } else {
            rec.tags_human[field] = rec.tags_human[field] === val ? null : val;
          }
          await saveDetailRecord();
          renderDetail();
        });

        row.appendChild(chip);
      });
      return row;
    }

    async function saveDetailRecord() {
      if (!currentDetailRecord) return;
      currentDetailRecord.search_text = buildSearchText(currentDetailRecord);
      await dbPut(currentDetailRecord);
    }

    // Delete button
    document.getElementById('delete-btn').addEventListener('click', async () => {
      if (currentDetailId == null) return;
      if (!confirm('Delete this photo?')) return;
      await dbDelete(currentDetailId);
      currentDetailId = null;
      currentDetailRecord = null;
      showView('gallery');
      await renderGallery();
      toast('Deleted');
    });

    // ============================================================
    // TOAST
    // ============================================================
    let toastTimer = null;
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 1500);
    }

    // ============================================================
    // BOOT — the camera is the home view; route through showView so the
    // stream lifecycle hooks run on first load.
    // ============================================================
    showView('camera');
  </script>
</body>
</html>
