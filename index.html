    // Renders one swatch tile: glyph art on top, label below. Selection inverts the art.
    function buildSwatchTile({ value, label, glyphHtml, isActive, onTap }) {
      const tile = document.createElement('button');
      tile.className = 'sw-tile' + (isActive ? ' active' : '');
      tile.setAttribute('data-value', value);
      tile.innerHTML = `
        <div class="sw-art">${glyphHtml}<span class="sw-check"></span></div>
        <div class="sw-label">${label}</div>
      `;
      tile.addEventListener('click', onTap);
      return tile;
    }

    // Render a section (label + summary + 4-col grid of swatch tiles).
    function buildSwatchSection({ label, getSummary, items, field, multi, glyphFor, valueFor }) {
      const section = document.createElement('div');
      section.className = 'sw-section';

      const head = document.createElement('div');
      head.className = 'sw-section-head';
      const lbl = document.createElement('span');
      lbl.className = 'sw-section-label';
      lbl.textContent = label;
      const sum = document.createElement('span');
      sum.className = 'sw-section-summary';
      head.appendChild(lbl);
      head.appendChild(sum);
      section.appendChild(head);

      const grid = document.createElement('div');
      grid.className = 'sw-grid';
      section.appendChild(grid);

      const refresh = () => {
        sum.textContent = getSummary();
        grid.innerHTML = '';
        items.forEach(item => {
          const value = valueFor ? valueFor(item) : item;
          const labelText = (typeof item === 'object' && item.label) ? item.label : item;
          const isActive = multi
            ? (captureDraft[field] || []).includes(value)
            : captureDraft[field] === value;
          const tile = buildSwatchTile({
            value,
            label: labelText,
            glyphHtml: glyphFor(item),
            isActive,
            onTap: () => {
              if (multi) {
                if (!captureDraft[field]) captureDraft[field] = [];
                const arr = captureDraft[field];
                const idx = arr.indexOf(value);
                if (idx === -1) arr.push(value);
                else arr.splice(idx, 1);
              } else {
                captureDraft[field] = (captureDraft[field] === value) ? null : value;
              }
              refresh();
            },
          });
          grid.appendChild(tile);
        });
      };
      refresh();
      return section;
    }

    function buildFormSection(title, build) {
      const s = document.createElement('div');
      s.className = 'section';
      const h = document.createElement('p');
      h.className = 'section-title';
      h.textContent = title;
      s.appendChild(h);
      build(s);
      return s;
    }

    function buildChipsContainer(items, field, multi, meta) {
      const row = document.createElement('div');
      row.className = 'chip-row';
      items.forEach(label => {
        const val = meta ? (meta.find(m => m.label === label)?.id || label) : label;
        const chip = document.createElement('button');
        chip.className = 'chip';
        chip.textContent = label;
        const isActive = multi
          ? (captureDraft[field] || []).includes(val)
          : captureDraft[field] === val;
        if (isActive) chip.classList.add('active');
        chip.addEventListener('click', () => {
          if (multi) {
            if (!captureDraft[field]) captureDraft[field] = [];
            const arr = captureDraft[field];
            const idx = arr.indexOf(val);
            if (idx === -1) arr.push(val);
            else arr.splice(idx, 1);
            chip.classList.toggle('active');
          } else {
            row.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
            if (captureDraft[field] === val) {
              captureDraft[field] = null;
            } else {
              captureDraft[field] = val;
              chip.classList.add('active');
            }
          }
        });
        row.appendChild(chip);
      });
      return row;
    }

    function buildNoteTextarea(field, placeholder) {
      const ta = document.createElement('textarea');
      ta.className = 'form-input';
      ta.rows = 2;
      ta.placeholder = placeholder || 'Note for this…';
      ta.value = captureDraft[field] || '';
      ta.addEventListener('input', () => {
        captureDraft[field] = ta.value.trim() || null;
      });
      return ta;
    }

    function buildTextInputField(field, label, placeholder) {
      const f = document.createElement('div');
      f.className = 'form-field';
      f.innerHTML = `<label class="form-label">${label}</label>`;
      const inp = document.createElement('input');
      inp.className = 'form-input';
      inp.type = 'text';
      if (placeholder) inp.placeholder = placeholder;
      inp.value = captureDraft[field] || '';
      inp.addEventListener('input', () => {
        captureDraft[field] = inp.value.trim() || null;
      });
      f.appendChild(inp);
      return f;
    }

    function buildSaveBar() {
      const bar = document.createElement('div');
      bar.className = 'sw-save-bar';
      const btn = document.createElement('button');
      btn.className = 'sw-save-btn';
      const update = () => {
        const t = captureDraft;
        let n = 0;
        if (t.typology) n++;
        if (t.element_name) n++;
        if (t.graphic_kind) n++;
        n += (t.concepts || []).length;
        n += (t.materials || []).length;
        if (t.creator) n++;
        if (t.year) n++;
        if (t.note) n++;
        btn.innerHTML = (n > 0
          ? `Save · ${n} ${n === 1 ? 'tag' : 'tags'}`
          : 'Save without tags') + ' &rarr;';
      };
      btn.addEventListener('click', finishCapture);
      bar.appendChild(btn);
      // Re-count whenever the user touches anything in the form.
      const observer = new MutationObserver(update);
      // Recount on any click — the save bar re-evaluates after each tap.
      document.addEventListener('click', update, true);
      document.addEventListener('input', update, true);
      update();
      return bar;
    }

    // ============================================================
    // Building form (single page, all sections)
    // ============================================================
    // Per the design system: Building → Typology + Concept + Author·Year.
    // Eight tiles per section, fixed 2×4 grid, glyph + label per tile.
    function renderBuildingForm(c) {
      if (!captureDraft.concepts) captureDraft.concepts = [];

      c.appendChild(buildSwatchSection({
        label: 'Typology',
        getSummary: () => captureDraft.typology || '',
        items: TYPOLOGY.slice(0, 8),
        field: 'typology',
        multi: false,
        glyphFor: typologyGlyph,
      }));
      c.appendChild(buildSwatchSection({
        label: 'Concept',
        getSummary: () => (captureDraft.concepts || []).map(id => {
          const m = CONCEPTS.find(c => c.id === id);
          return m ? m.label : id;
        }).join(' · '),
        items: CONCEPTS,
        field: 'concepts',
        multi: true,
        glyphFor: c => conceptGlyph(c.id),
        valueFor: c => c.id,
      }));
      c.appendChild(buildAuthorYearSection());
      c.appendChild(buildPersonalNoteSection());
      c.appendChild(buildSaveBar());
    }

    function buildAuthorYearSection() {
      const s = document.createElement('div');
      s.className = 'sw-section sw-section-text';
      const head = document.createElement('div');
      head.className = 'sw-section-head';
      const lbl = document.createElement('span');
      lbl.className = 'sw-section-label';
      lbl.textContent = 'Author · Year';
      head.appendChild(lbl);
      s.appendChild(head);
      const inp = document.createElement('input');
      inp.className = 'sw-line-input';
      inp.type = 'text';
      inp.placeholder = 'e.g. Kahn · 1972';
      inp.value = [captureDraft.creator, captureDraft.year].filter(Boolean).join(' · ');
      inp.addEventListener('input', () => {
        // Split on " · " or comma for friendly entry
        const parts = inp.value.split(/\s*[·,]\s*/);
        captureDraft.creator = (parts[0] || '').trim() || null;
        captureDraft.year    = (parts[1] || '').trim() || null;
      });
      s.appendChild(inp);
      return s;
    }

    function buildPersonalNoteSection() {
      const s = document.createElement('div');
      s.className = 'sw-section sw-section-text';
      const head = document.createElement('div');
      head.className = 'sw-section-head';
      const lbl = document.createElement('span');
      lbl.className = 'sw-section-label';

    // ============================================================
    // Element form: Element + Materiality + Concept + Author·Year + Note
    // ============================================================
    // First eight elements as a flat 2×4 grid (drops the four sub-group headers
    // — the design favours visual scan over taxonomy).
    const ELEMENTS_TOP_8 = ['Column', 'Wall', 'Arch', 'Door', 'Window', 'Stair', 'Ramp', 'Roof'];

    function renderElementForm(c) {
      if (!captureDraft.materials) captureDraft.materials = [];
      if (!captureDraft.concepts)  captureDraft.concepts  = [];

      c.appendChild(buildSwatchSection({
        label: 'Element',
        getSummary: () => captureDraft.element_name || '',
        items: ELEMENTS_TOP_8,
        field: 'element_name',
        multi: false,
        glyphFor: elementGlyph,
      }));
      c.appendChild(buildSwatchSection({
        label: 'Materiality',
        getSummary: () => (captureDraft.materials || []).join(' · '),
        items: MATERIALS.slice(0, 8),
        field: 'materials',
        multi: true,
        glyphFor: materialPatternSvg,
      }));
      c.appendChild(buildSwatchSection({
        label: 'Concept',
        getSummary: () => (captureDraft.concepts || []).map(id => {
          const m = CONCEPTS.find(c => c.id === id);
          return m ? m.label : id;
        }).join(' · '),
        items: CONCEPTS,
        field: 'concepts',
        multi: true,
        glyphFor: c => conceptGlyph(c.id),
        valueFor: c => c.id,
      }));
      c.appendChild(buildAuthorYearSection());
      c.appendChild(buildPersonalNoteSection());
      c.appendChild(buildSaveBar());
    }

    // optional artwork label-photo block re-render whenever the kind changes.

      ],
      book: [
        { field: 'title',   label: 'Title' },
        { field: 'creator', label: 'Author' },
        { field: 'source',  label: 'Publisher / Library' },
      ],
      drawing: [
        { field: 'title',   label: 'Title' },
        { field: 'creator', label: 'Creator' },
        { field: 'year',    label: 'Year' },
      ],
      product: [
        { field: 'brand',  label: 'Brand' },
        { field: 'model',  label: 'Model' },

      ],

    function renderGraphicForm(c) {
      // Kind chips
      const kindSection = buildFormSection('Kind', s => {
        const row = document.createElement('div');
        row.className = 'chip-row';
        GRAPHIC_KINDS.forEach(k => {

          chip.className = 'chip';

          if (captureDraft.graphic_kind === k.id) chip.classList.add('active');
          chip.addEventListener('click', () => {
            captureDraft.graphic_kind = (captureDraft.graphic_kind === k.id) ? null : k.id;

            renderCaptureStep();
          });
          row.appendChild(chip);
        });
        s.appendChild(row);
      });
      c.appendChild(kindSection);

      const kind = captureDraft.graphic_kind;
      const fields = GRAPHIC_FIELDS[kind];

        c.appendChild(buildFormSection('Details', s => {
          fields.forEach(f => s.appendChild(buildTextInputField(f.field, f.label)));

      c.appendChild(buildFormSection('Personal note', s => {
        const ta = buildNoteTextarea('note', 'A line or two about why this caught your eye…');

        s.appendChild(ta);

    // ============================================================
    // LABEL-INPUT (shared by capture flow and detail view)
    // ============================================================
    const labelInput = document.getElementById('label-input');
    labelInput.addEventListener('change', async (event) => {
      const file = event.target.files[0];
      event.target.value = '';
      if (!file) return;

      if (labelInputTarget === 'detail' && currentDetailRecord) {
        currentDetailRecord.label_blob = file;
        await saveDetailRecord();
        renderDetail();
      }
      labelInputTarget = null;
    });

    // ============================================================
    // Finish capture — write to DB
    // ============================================================
    async function finishCapture({ silent = false } = {}) {
      const t = captureDraft;
      const record = {
        blob: pendingBlob,
        label_blob: pendingLabelBlob || null,
        created_at: Date.now(),
        location: takePendingLocation(),
        tags_human: {
          type: t.type,
          typology: t.typology || null,
          typology_note: t.typology_note || null,
          concepts: t.concepts || [],
          concepts_note: t.concepts_note || null,
          element_name: t.element_name || null,
          element_note: t.element_note || null,
          material: null,
          materials: t.materials || [],
          materials_note: t.materials_note || null,
          graphic_kind: t.graphic_kind || null,
          title: t.title || null,
          creator: t.creator || null,
          year: t.year || null,
          source: t.source || null,
          brand: t.brand || null,
          model: t.model || null,
          contact_name: t.contact_name || null,
          contact_company: t.contact_company || null,
          project: null,
          note: t.note || null,
          visual: [],
          keywords: [],
        },
        tags_machine: {},
      };
      record.search_text = buildSearchText(record);

      const id = await dbAdd(record);
      resetCapture();
      showView('home');
      if (!silent) toast('Saved');
      return id;
    }

    // ============================================================
    // PROJECT MODE
    // ============================================================
    async function getProjectNames() {
      const all = await dbGetAll();
      const seen = new Map();
      all.sort((a, b) => b.created_at - a.created_at).forEach(r => {
        const p = r.tags_human && r.tags_human.project;
        if (p && !seen.has(p)) seen.set(p, r.created_at);
      });
      // Also include user-created projects that don't yet have any photos.
      getStoredProjects().forEach(p => {
        if (!seen.has(p)) seen.set(p, 0);
      });
      return [...seen.keys()];
    }

    async function savePhotoToProject(file) {
      const record = {
        blob: file,
        label_blob: null,
        created_at: Date.now(),
        location: takePendingLocation(),
        tags_human: {
          type: null,
          typology: null,
          concepts: [],
          element_name: null,
          material: null,
          graphic_kind: null,
          title: null,
          creator: null,
          year: null,
          source: null,
          brand: null,
          model: null,
          contact_name: null,
          contact_company: null,
          project: activeProject,
          visual: [],
          keywords: [],
        },
        tags_machine: {},
      };
      record.search_text = buildSearchText(record);
      await dbAdd(record);

      // The project now exists in the DB; drop it from the pending list if present.
      pendingNewProjects = pendingNewProjects.filter(p => p !== activeProject);

      // Stay in the camera, restart location capture for the next shot.
      startLocationCapture();
      await refreshCameraThumb();
      toast('Saved to ' + activeProject);
    }

    // ============================================================
    // GALLERY
    // ============================================================
    document.getElementById('search-input').addEventListener('input', (e) => {
      activeFilters.search = e.target.value.trim().toLowerCase();
      renderGallery();
    });

    document.querySelectorAll('[data-type-filter]').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('[data-type-filter]').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeFilters.type = chip.dataset.typeFilter;
        renderGallery();
      });
    });

    async function renderGallery() {
      // free old object urls
      objectUrls.forEach(URL.revokeObjectURL);
      objectUrls = [];

      const all = await dbGetAll();
      renderProjectFilters(all);

      const queryWords = activeFilters.search.split(/\s+/).filter(Boolean);

      const filtered = all.filter(rec => {
        if (activeFilters.type !== 'all' && rec.tags_human.type !== activeFilters.type) return false;
        if (activeFilters.project && rec.tags_human.project !== activeFilters.project) return false;
        if (queryWords.length) {
          const text = rec.search_text || buildSearchText(rec);
          return queryWords.every(w => text.includes(w));
        }
        return true;
      });
      filtered.sort((a, b) => b.created_at - a.created_at);

      const grid = document.getElementById('photo-grid');
      grid.innerHTML = '';
      filtered.forEach(rec => {
        const tile = document.createElement('div');
        tile.className = 'tile';
        const img = document.createElement('img');
        const url = URL.createObjectURL(rec.blob);
        objectUrls.push(url);
        img.src = url;
        tile.appendChild(img);
        const badge = document.createElement('span');
        badge.className = 'type-badge';
        badge.textContent = (rec.tags_human.type || '?').slice(0, 1).toUpperCase();
        tile.appendChild(badge);
        tile.addEventListener('click', () => openDetail(rec.id));
        grid.appendChild(tile);
      });

      document.getElementById('count').textContent =
        `${filtered.length}${all.length !== filtered.length ? ' of ' + all.length : ''} ${filtered.length === 1 ? 'photo' : 'photos'}`;
      document.getElementById('empty').hidden = all.length !== 0;
    }

    function renderProjectFilters(all) {
      const row = document.getElementById('project-filter-row');

      // Count photos per project, ordered by most-recently-used project first.
      const counts = new Map();
      all.slice().sort((a, b) => b.created_at - a.created_at).forEach(r => {
        const p = r.tags_human && r.tags_human.project;
        if (p) counts.set(p, (counts.get(p) || 0) + 1);
      });

      if (counts.size === 0) {
        row.hidden = true;
        row.innerHTML = '';
        // Clear stale project filter if the last project just got deleted
        if (activeFilters.project) activeFilters.project = null;
        return;
      }

      row.hidden = false;
      row.innerHTML = '';
      counts.forEach((count, name) => {
        const chip = document.createElement('button');
        chip.className = 'chip';
        chip.textContent = `${name} (${count})`;
        if (activeFilters.project === name) chip.classList.add('active');
        chip.addEventListener('click', () => {
          activeFilters.project = (activeFilters.project === name) ? null : name;
          renderGallery();
        });
        row.appendChild(chip);
      });
    }

    // ============================================================
    // DETAIL + ENRICH (combined)
    // ============================================================
    async function openDetail(id) {
      const rec = await dbGet(id);
      if (!rec) return;
      currentDetailId = id;
      currentDetailRecord = rec;
      renderDetail();
      showView('detail');
    }

    function renderDetail() {
      const rec = currentDetailRecord;
      if (!rec) return;

      const img = document.getElementById('detail-img');
      const url = URL.createObjectURL(rec.blob);
      objectUrls.push(url);
      img.src = url;

      const dateEl = document.getElementById('detail-date');
      dateEl.innerHTML = '';
      dateEl.appendChild(document.createTextNode(new Date(rec.created_at).toLocaleString()));
      if (rec.location && rec.location.lat != null && rec.location.lng != null) {
        const sep = document.createElement('span');
        sep.textContent = ' · ';
        sep.style.color = '#555';
        dateEl.appendChild(sep);
        const link = document.createElement('a');
        link.href = `https://maps.apple.com/?q=${rec.location.lat},${rec.location.lng}`;
        link.target = '_blank';
        link.rel = 'noopener';
        link.style.color = '#aaa';
        link.style.textDecoration = 'none';
        link.textContent = `${rec.location.lat.toFixed(4)}, ${rec.location.lng.toFixed(4)}`;
        dateEl.appendChild(link);
      }

      const body = document.getElementById('detail-body');
      body.innerHTML = '';

      const type = rec.tags_human.type;

      // TYPE picker — editable so untagged (project) photos can be classified later
      body.appendChild(section('Type', buildChipPicker(
        TYPES.map(t => t.label), 'type', false, TYPES
      )));

      if (type === 'building') renderBuildingFields(body);
      if (type === 'element')  renderElementFields(body);
      if (type === 'graphic')  renderGraphicFields(body);

      // Universal sections
      renderProjectField(body);
      renderNoteField(body);
      renderVisualField(body);
      renderKeywordsField(body);
    }

    // Section helper that optionally appends an inline note textarea bound to a tags_human field.
    function sectionWithNote(title, contentEl, noteField) {
      const s = section(title, contentEl);
      if (!noteField) return s;
      const textarea = document.createElement('textarea');
      textarea.className = 'form-input';
      textarea.rows = 2;
      textarea.placeholder = 'Note for this…';
      textarea.style.marginTop = '0.5rem';
      textarea.value = currentDetailRecord.tags_human[noteField] || '';
      textarea.addEventListener('input', () => {
        currentDetailRecord.tags_human[noteField] = textarea.value.trim() || null;
      });
      textarea.addEventListener('blur', saveDetailRecord);
      s.appendChild(textarea);
      return s;
    }

    function section(title, contentEl) {
      const s = document.createElement('div');
      s.className = 'section';
      const h = document.createElement('p');
      h.className = 'section-title';
      h.textContent = title;
      s.appendChild(h);
      if (typeof contentEl === 'string') {
        const p = document.createElement('p');
        p.style.margin = 0;
        p.textContent = contentEl;
        s.appendChild(p);
      } else if (contentEl) {
        s.appendChild(contentEl);
      }
      return s;
    }

    // -------- Building fields --------
    function renderBuildingFields(body) {
      const concepts = getEffectiveConcepts();
      body.appendChild(sectionWithNote(

      ));
      body.appendChild(sectionWithNote(

      ));

      ));

    // -------- Element fields --------
    function renderElementFields(body) {
      const wrap = document.createElement('div');

        const g = document.createElement('div');

        buildChipPicker(GRAPHIC_KINDS.map(k => k.label), 'graphic_kind', false, GRAPHIC_KINDS)
      ));

      if (kind === 'artwork') {
        body.appendChild(renderArtworkDetailSection());
      } else if (kind === 'book') {
        body.appendChild(buildTextFieldsSection('Book', [
          { field: 'title', label: 'Title' },
          { field: 'creator', label: 'Author' },

          { field: 'model', label: 'Model' },
          { field: 'source', label: 'Source' },
        ]));

        body.appendChild(buildTextFieldsSection('Contact', [
          { field: 'contact_name', label: 'Name' },

    // -------- Universal: Keywords --------
    function renderKeywordsField(body) {
      const s = document.createElement('div');
      s.className = 'section';
      const h = document.createElement('p');
      h.className = 'section-title';
      h.textContent = 'Keywords';
      s.appendChild(h);

      const list = document.createElement('div');
      list.className = 'keyword-list';
      s.appendChild(list);

      const rec = currentDetailRecord;
      (rec.tags_human.keywords || []).forEach((kw, idx) => {
        const tag = document.createElement('span');
        tag.className = 'keyword-tag';
        tag.textContent = kw;
        const x = document.createElement('span');
        x.className = 'remove';
        x.textContent = '×';
        x.addEventListener('click', async () => {
          rec.tags_human.keywords.splice(idx, 1);
          await saveDetailRecord();
          renderDetail();
        });
        tag.appendChild(x);
        list.appendChild(tag);
      });

      const inputRow = document.createElement('div');
      inputRow.style.display = 'flex';
      inputRow.style.gap = '0.35rem';
      inputRow.style.marginTop = '0.3rem';

      const inp = document.createElement('input');
      inp.className = 'keyword-input';
      inp.placeholder = 'Add keyword…';
      inp.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          const kw = inp.value.trim().toLowerCase();
          if (!kw) return;
          if (!rec.tags_human.keywords) rec.tags_human.keywords = [];
          if (!rec.tags_human.keywords.includes(kw)) {
            rec.tags_human.keywords.push(kw);
            await saveDetailRecord();
            renderDetail();
          } else {
            inp.value = '';
          }
        }
      });
      inputRow.appendChild(inp);
      s.appendChild(inputRow);

      body.appendChild(s);
    }

    // -------- Helpers: generic chip-picker  --------
    function buildChipPicker(items, field, multi, meta) {
      return buildChipPickerRow(items, field, multi, meta);
    }

    function buildChipPickerRow(items, field, multi, meta) {
      const row = document.createElement('div');
      row.className = 'chip-row';
      const rec = currentDetailRecord;

      items.forEach(label => {
        // For concepts/graphic-kinds, store the .id; for others, the label itself
        const val = meta ? (meta.find(m => m.label === label)?.id || label) : label;

        const chip = document.createElement('button');
        chip.className = 'chip';
        chip.textContent = label;

        let isActive;
        if (multi) {
          isActive = (rec.tags_human[field] || []).includes(val);
        } else {
          isActive = rec.tags_human[field] === val;
        }
        if (isActive) chip.classList.add('active');

        chip.addEventListener('click', async () => {
          if (multi) {
            if (!rec.tags_human[field]) rec.tags_human[field] = [];
            const arr = rec.tags_human[field];
            const idx = arr.indexOf(val);
            if (idx === -1) arr.push(val);
            else arr.splice(idx, 1);
          } else {
            rec.tags_human[field] = rec.tags_human[field] === val ? null : val;
          }
          await saveDetailRecord();
          renderDetail();
        });

        row.appendChild(chip);
      });
      return row;
    }

    async function saveDetailRecord() {
      if (!currentDetailRecord) return;
      currentDetailRecord.search_text = buildSearchText(currentDetailRecord);
      await dbPut(currentDetailRecord);
    }

    // Delete button
    document.getElementById('delete-btn').addEventListener('click', async () => {
      if (currentDetailId == null) return;
      if (!confirm('Delete this photo?')) return;
      await dbDelete(currentDetailId);
      currentDetailId = null;
      currentDetailRecord = null;
      showView('gallery');
      await renderGallery();
      toast('Deleted');
    });

    // ============================================================
    // TOAST
    // ============================================================
    let toastTimer = null;
    function toast(msg) {
      const el = document.getElementById('toast');
      el.innerHTML = '';
      el.style.background = '';
      el.style.color = '';
      el.style.pointerEvents = 'none';
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 1500);
    }

    // Toast with a tappable action (the "Tag now" escape from a Lite save).
    function toastWithAction(text, btnText, fn, { color = null, ms = 4500 } = {}) {
      const el = document.getElementById('toast');
      el.innerHTML = '';
      if (color) {
        el.style.background = color;
        el.style.color = '#0F0F0E';
      } else {
        el.style.background = '';
        el.style.color = '';
      }
      const span = document.createElement('span');
      span.textContent = text;
      el.appendChild(span);
      if (btnText) {
        const btn = document.createElement('button');
        btn.textContent = btnText;
        btn.style.cssText = 'margin-left:0.7rem; background:transparent; color:inherit; font-weight:600; padding:0; cursor:pointer;';
        btn.addEventListener('click', () => {
          el.classList.remove('show');
          el.style.pointerEvents = 'none';
          fn();
        });
        el.appendChild(btn);
      }
      el.classList.add('show');
      el.style.pointerEvents = 'auto';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        el.classList.remove('show');
        el.style.pointerEvents = 'none';
      }, ms);
    }

    function toastLiteSaved(id) {
      const t = TYPES.find(x => x.id === getReferenceType()) || TYPES[0];
      toastWithAction(`Saved as ${t.label.toLowerCase()}`, 'Tag now', () => openDetail(id), { color: '#A8EFB7' });
    }

    // ============================================================
    // BOOT — the camera is the home view; route through showView so the
    // stream lifecycle hooks run on first load.
    // ============================================================
    showView('camera');
  </script>
</body>
