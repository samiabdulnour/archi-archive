<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>archi-archive — apple direction, accent options</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=IBM+Plex+Mono:wght@400;500&family=Newsreader:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; padding: 0; background: #f4f4f4; font-family: -apple-system, system-ui, sans-serif; }
  #root { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="archi-app.jsx"></script>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { ArchiApp, makeAppleVariant, makeNanVariant } = window;

function Phone({ children }) {
  return (
    <div style={{
      width: 390, height: 800,
      background: '#000',
      borderRadius: 50,
      padding: 10,
      boxShadow: '0 30px 60px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.18)',
    }}>
      <div style={{
        width: '100%', height: '100%',
        background: '#F2F2F7',
        borderRadius: 40,
        overflow: 'hidden',
        position: 'relative',
        display: 'flex', flexDirection: 'column',
      }}>
        <div style={{
          position: 'absolute', top: 10, left: '50%', transform: 'translateX(-50%)',
          width: 110, height: 32, borderRadius: 22, background: '#000', zIndex: 50,
        }} />
        <div style={{
          position: 'absolute', top: 16, left: 28, fontSize: 13, fontWeight: 600,
          color: '#000', zIndex: 40,
        }}>9:41</div>
        {children}
      </div>
    </div>
  );
}

// NaN foundry-inspired green direction — chartreuse field, black ink, tracked caps.
// Three green shades to choose from.
const GREENS = [
  { id: 'chartreuse', bg: '#A8F060', label: 'Chartreuse',  desc: 'Yellow-leaning, closest to NaN foundry reference' },
  { id: 'mint',       bg: '#7CEB7C', label: 'Mint',        desc: 'Balanced green, slightly cooler' },
  { id: 'acid',       bg: '#C7F94B', label: 'Acid',        desc: 'Punchier, edges toward yellow' },
];

const SCREENS = [
  { id: 'home',    label: 'Home' },
  { id: 'capture', label: 'Capture · grid menu' },
  { id: 'saved',   label: 'Saved' },
  { id: 'gallery', label: 'Gallery' },
];

function App() {
  return (
    <DesignCanvas
      title="archi-archive — Mint direction"
      subtitle="#7CEB7C field, black ink, tracked-out caps. Four screens of the capture flow."
    >
      <DCSection id="mint" title="MINT · #7CEB7C — Capture flow, four screens">
        {SCREENS.map(s => (
          <DCArtboard key={s.id} id={`mint-${s.id}`}
            label={s.label} width={410} height={820}>
            <Phone>
              <ArchiApp variant="nan" initialScreen={s.id} key={'mint-' + s.id} />
            </Phone>
          </DCArtboard>
        ))}
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
